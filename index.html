<!doctype html> <html lang="gu"> <head>   <meta charset="UTF-8">   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">   <title>Sanskardham Hospital | Vision v2.0</title>   <script src="https://cdn.tailwindcss.com"></script>   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&amp;display=swap" rel="stylesheet">   <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>   <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>   <style>         body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; touch-action: manipulation; overflow-x: hidden; }         .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }         .btn-active:active { transform: scale(0.95); transition: 0.1s; }         .sidebar { transition: 0.3s; position: fixed; top: 0; left: -280px; height: 100%; width: 280px; background: white; z-index: 1000; box-shadow: 10px 0 20px rgba(0,0,0,0.1); }         .sidebar.open { left: 0; }         .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }         .overlay.active { display: block; }     </style> </head> <body>    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>    <div id="sidebar" class="sidebar p-6 flex flex-col">     <div class="mb-8 border-b pb-4">       <h2 class="text-xl font-black text-blue-900">Sanskardham</h2>       <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Vision Menu</p>     </div>     <nav class="space-y-2">       <button onclick="showProfileForm()" class="w-full text-left p-4 rounded-xl hover:bg-blue-50 flex items-center space-x-3 font-bold text-gray-700"><span>👤</span> <span>My Profile</span></button>       <button onclick="showDutySection()" class="w-full text-left p-4 rounded-xl hover:bg-blue-50 flex items-center space-x-3 font-bold text-gray-700"><span>📅</span> <span>Duty List</span></button>       <button id="adminStaffBtn" onclick="showStaffList()" class="hidden w-full text-left p-4 rounded-xl bg-blue-600 text-white flex items-center space-x-3 font-bold"><span>📋</span> <span>Staff Records</span></button>       <button onclick="alert('Coming Soon')" class="w-full text-left p-4 rounded-xl hover:bg-red-50 flex items-center space-x-3 font-bold text-red-600"><span>🗑️</span> <span>Delete Data</span></button>     </nav>     <button onclick="location.reload()" class="mt-auto p-4 bg-gray-100 rounded-xl font-bold text-gray-500 text-xs text-center uppercase">Logout</button>   </div>    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white relative shadow-2xl">     <header class="gradient-header text-white p-6 rounded-b-[40px] shadow-lg sticky top-0 z-50">       <div class="flex justify-between items-center">         <div class="flex items-center space-x-4">           <button onclick="toggleMenu()" class="text-2xl">☰</button>           <div>             <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Sanskardham</h1>             <p class="text-[9px] font-bold text-blue-200 uppercase tracking-widest">Hospital Portal</p>           </div>         </div>         <div id="roleBadge" class="hidden bg-white/20 px-3 py-1 rounded-xl text-[10px] font-bold uppercase">Guest</div>       </div>       <div id="dateArea" class="hidden flex items-center bg-black/10 rounded-2xl px-4 py-2 mt-4">         <input type="date" id="dateInput" onchange="refreshAll()" class="bg-transparent text-white font-bold outline-none text-sm w-full">         <button onclick="toggleShift()" id="shiftIco" class="ml-2 bg-white/20 p-1 rounded-lg text-lg">☀️</button>       </div>     </header>      <main class="flex-grow relative">        <div id="loginPage" class="p-8 absolute inset-0 flex flex-col justify-center space-y-5 bg-white z-40">         <div class="text-center mb-5">           <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4"><span class="text-4xl">🏥</span></div>           <h2 class="text-2xl font-black text-gray-800 tracking-tight">Staff Portal</h2>         </div>         <input type="text" id="loginID" placeholder="User ID" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold">         <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold">         <button onclick="login()" class="w-full gradient-header text-white p-5 rounded-2xl font-bold btn-active uppercase shadow-xl">Login</button>       </div>        <div id="profileSection" class="hidden p-6">         <h2 class="text-2xl font-black mb-6">My Profile</h2>         <div class="space-y-4">           <input type="text" id="profName" placeholder="Full Name" class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none">           <input type="text" id="profID" placeholder="Staff ID Number" class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none">           <input type="number" id="profMobile" placeholder="Mobile Number" class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none">           <input type="text" id="profExp" placeholder="Experience" class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none">           <button onclick="submitProfile()" class="w-full gradient-header text-white p-5 rounded-2xl font-bold uppercase shadow-lg">Submit Details</button>         </div>       </div>        <div id="staffListSection" class="hidden p-6">         <h2 class="text-2xl font-black mb-6">Staff Records</h2>         <div id="staffListContainer" class="space-y-3"></div>       </div>        <div id="dutySection" class="hidden p-5 space-y-6">         <div class="relative">           <input type="text" id="searchBar" onkeyup="doSearch()" placeholder="Search Name..." class="w-full p-4 pl-12 rounded-2xl bg-white shadow-sm border border-gray-200 outline-none font-bold">           <span class="absolute left-4 top-4">🔍</span>         </div>         <div id="searchBox" class="hidden p-4 rounded-2xl font-bold text-center"></div>         <div id="deptGrid" class="grid grid-cols-2 gap-4"></div>       </div>        <div id="listPage" class="hidden p-5">         <button onclick="showDutySection()" class="text-blue-600 font-bold text-xs mb-6 uppercase">⬅ Back to Departments</button>         <div class="text-center mb-6">           <h2 id="lTitle" class="text-3xl font-black text-gray-800 uppercase italic"></h2>           <p id="lSub" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1"></p>         </div>         <div id="lBody" class="space-y-3"></div>       </div>      </main>      <footer class="p-4 flex justify-center border-t bg-white">       <p class="text-blue-900 font-black text-[9px] tracking-[4px] opacity-40">JATIN SOLANKI BY VISION</p>     </footer>   </div>    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-[2000] flex items-center justify-center p-6 backdrop-blur-sm">     <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">       <h3 class="font-black text-gray-800 mb-4 text-center border-b pb-2">Set Duty Range</h3>       <div class="space-y-3 mb-6">         <div class="flex space-x-2">           <div class="flex-1 text-center"><label class="text-[9px] font-bold">START</label><input type="date" id="rangeStart" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold"></div>           <div class="flex-1 text-center"><label class="text-[9px] font-bold">END</label><input type="date" id="rangeEnd" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold"></div>         </div>         <input type="text" id="staffInput" placeholder="Enter Staff Name" class="w-full p-4 bg-gray-100 rounded-2xl font-bold outline-none text-center">       </div>       <div class="flex space-x-3">         <button onclick="closeEdit()" class="flex-1 p-4 bg-gray-100 rounded-2xl font-bold text-gray-400">CANCEL</button>         <button onclick="saveSlot()" class="flex-1 p-4 gradient-header text-white rounded-2xl font-bold">SAVE</button>       </div>     </div>   </div>    <script>     const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };     firebase.initializeApp(firebaseConfig);     const db = firebase.database().ref("hospital_v11_final");     const profileDB = firebase.database().ref("staff_profiles");      let role = "viewer", shift = "Day", selectedDate = "", appData = {}, currentEditKey = "";      function toggleMenu() {       document.getElementById('sidebar').classList.toggle('open');       document.getElementById('overlay').classList.toggle('active');     }      function hideAll() {       ['loginPage','profileSection','staffListSection','dutySection','listPage'].forEach(id => {         document.getElementById(id).classList.add('hidden');       });     }      function login() {       const id = document.getElementById('loginID').value.trim();       const p = document.getElementById('loginPass').value;       if(id === "ssgd" && p === "9099020925") role = "admin";       else if(id === "ssgd" && p === "9712284024") role = "viewer";       else return alert("Invalid Login!");              hideAll();       document.getElementById('dutySection').classList.remove('hidden');       document.getElementById('dateArea').classList.remove('hidden');       document.getElementById('roleBadge').classList.remove('hidden');       document.getElementById('roleBadge').innerText = role;       if(role === 'admin') document.getElementById('adminStaffBtn').classList.remove('hidden');              startSync();     }      function startSync() {       const today = new Date().toISOString().split('T')[0];       document.getElementById('dateInput').value = today;       selectedDate = today;       db.on('value', (s) => {         appData = s.val() || { "Depts": ["OPD", "EMERGENCY", "OFF LIST"] };         renderGrid();       });     }      function renderGrid() {       const grid = document.getElementById('deptGrid');       grid.innerHTML = "";       const ds = appData["Depts"] || ["OPD", "EMERGENCY", "OFF LIST"];       ds.forEach(d => {         grid.innerHTML += `<div onclick="openView('${d}')" class="p-6 bg-white rounded-[30px] border border-slate-100 shadow-sm flex flex-col items-center btn-active cursor-pointer">           <span class="text-3xl mb-2">${d.includes('OFF')?'😴':'🏥'}</span>           <span class="font-bold text-slate-700 text-xs uppercase">${d}</span>         </div>`;       });     }      function openView(d) {       hideAll();       document.getElementById('listPage').classList.remove('hidden');       document.getElementById('lTitle').innerText = d;       document.getElementById('lSub').innerText = `${shift} | ${selectedDate}`;       let h = "";       const limit = (d === 'OPD') ? 10 : 6;       for(let i=1; i<=limit; i++) {         let key = `${selectedDate}_${d}_${i}_${shift}`;         let val = appData[key] || "---";         h += `<div class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center border-l-4 border-blue-600 shadow-sm">           <span class="text-[10px] font-bold text-slate-400">Slot ${i}</span>           <span onclick="${role==='admin'?`openEdit('${key}')`:''}" class="${role==='admin'?'text-blue-600 font-bold underline cursor-pointer':'font-bold text-slate-800'}">${val}</span>         </div>`;       }       document.getElementById('lBody').innerHTML = h;     }      function showProfileForm() { toggleMenu(); hideAll(); document.getElementById('profileSection').classList.remove('hidden'); }      function submitProfile() {       const name = document.getElementById('profName').value;       const id = document.getElementById('profID').value;       if(!name || !id) return alert("નામ અને ID જરૂરી છે");       profileDB.push({ name, id, mobile: document.getElementById('profMobile').value, exp: document.getElementById('profExp').value });       alert("Profile Saved!");       showDutySection();     }      function showStaffList() {       toggleMenu(); hideAll(); document.getElementById('staffListSection').classList.remove('hidden');       profileDB.once('value', (s) => {         const data = s.val();         const cont = document.getElementById('staffListContainer');         cont.innerHTML = "";         if(!data) return cont.innerHTML = "No Records Found";         Object.values(data).forEach(s => {           cont.innerHTML += `<div class="p-4 bg-white border border-blue-100 rounded-2xl shadow-sm">             <p class="font-black text-blue-900">${s.name}</p>             <p class="text-xs font-bold text-gray-500">ID: ${s.id} | Mob: ${s.mobile}</p>             <p class="text-xs text-blue-500">Exp: ${s.exp}</p>           </div>`;         });       });     }      function openEdit(key) { currentEditKey = key; document.getElementById('editModal').classList.remove('hidden'); }     function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }      function saveSlot() {       const name = document.getElementById('staffInput').value.trim() || "---";       const start = new Date(document.getElementById('rangeStart').value);       const end = new Date(document.getElementById('rangeEnd').value);       if(isNaN(start.getTime()) || isNaN(end.getTime())) return alert("તારીખ પસંદ કરો");       const parts = currentEditKey.split('_');       let updates = {};       let tempDate = new Date(start);       while(tempDate <= end) {         const dStr = tempDate.toISOString().split('T')[0];         updates[`${dStr}_${parts[1]}_${parts[2]}_${parts[3]}`] = name;         tempDate.setDate(tempDate.getDate() + 1);       }       db.update(updates).then(() => { closeEdit(); openView(parts[1]); });     }      function showDutySection() { toggleMenu(); hideAll(); document.getElementById('dutySection').classList.remove('hidden'); }     function toggleShift() { shift = (shift === "Day") ? "Night" : "Day"; document.getElementById('shiftIco').innerText = (shift === "Day") ? "☀️" : "🌙"; if(!document.getElementById('listPage').classList.contains('hidden')) openView(document.getElementById('lTitle').innerText); }     function refreshAll() { selectedDate = document.getElementById('dateInput').value; if(!document.getElementById('listPage').classList.contains('hidden')) openView(document.getElementById('lTitle').innerText); }      function doSearch() {       const q = document.getElementById('searchBar').value.toLowerCase();       const res = document.getElementById('searchBox');       if(!q) { res.classList.add('hidden'); return; }       let found = "";       for(let k in appData) { if(k.startsWith(selectedDate) && k.endsWith(shift) && appData[k].toLowerCase().includes(q)) { found = k.split('_')[1]; break; } }       res.classList.remove('hidden');       res.innerHTML = found ? `✅ તમારી ડ્યુટી ${found} માં છે.` : `⚠️ નામ મળ્યું નથી.`;       res.className = found ? "p-4 rounded-2xl bg-green-50 text-green-700 font-bold" : "p-4 rounded-2xl bg-red-50 text-red-700 font-bold";     }   </script> </body> </html>
