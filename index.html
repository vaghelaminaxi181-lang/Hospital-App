<!doctype html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Hospital | Manager View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .excel-table th, .excel-table td { border: 1px solid #cbd5e1; padding: 8px; text-align: center; font-size: 11px; min-width: 40px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; min-width: 120px !important; font-weight: bold; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .date-btn { min-width: 45px; height: 45px; border-radius: 50%; display: flex; items-center: center; justify-content: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; font-weight: bold; font-size: 12px; flex-shrink: 0; }
        .date-active { background: #1e3a8a; color: white; border-color: #2563eb; transform: scale(1.1); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .pending-badge { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; padding: 10px; border-radius: 15px; font-weight: bold; }
        .suggestion-box { position: absolute; background: white; border: 1px solid #ddd; z-index: 100; max-height: 200px; overflow-y: auto; width: 200px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; }
    </style>
</head>
<body class="pb-20">

<div id="loginPage" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-3xl shadow-xl">
    <h2 class="text-2xl font-black text-center mb-6">Staff Management</h2>
    <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 mb-4 border rounded-2xl text-center font-bold">
    <button onclick="login()" class="w-full gradient-header text-white p-4 rounded-2xl font-bold uppercase">Login</button>
</div>

<div id="mainApp" class="hidden">
    <header class="gradient-header text-white p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-black uppercase">SSGD Hospital</h1>
            <button onclick="downloadDutyPDF()" class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold">PDF ડાઉનલોડ</button>
        </div>
        
        <div class="flex space-x-3 overflow-x-auto pb-2" id="dateScroll">
            </div>
    </header>

    <main class="p-2 space-y-6">
        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border">
            <div class="overflow-x-auto" id="gridContainer">
                </div>
        </div>

        <div class="p-2">
            <h3 class="text-sm font-black text-red-600 mb-2 uppercase">⚠️ બાકી રહેલા સ્ટાફ (Pending)</h3>
            <div id="pendingList" class="pending-badge text-xs flex flex-wrap gap-2">
                બધા સ્ટાફની ડ્યુટી સેટ છે!
            </div>
        </div>
    </main>
</div>

<div id="assignModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[1000]">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
        <h3 id="modalInfo" class="font-black text-blue-900 mb-4 border-b pb-2">Assign Duty</h3>
        <div class="relative mb-6">
            <input type="text" id="staffSearch" onkeyup="filterSuggestions(this.value)" placeholder="સ્ટાફનું નામ લખો..." class="w-full p-4 bg-gray-50 border rounded-2xl font-bold outline-none">
            <div id="suggestBox" class="suggestion-box hidden"></div>
        </div>
        <div class="flex space-x-2">
            <button onclick="closeModal()" class="flex-1 p-4 bg-gray-100 rounded-2xl font-bold text-gray-500">CANCEL</button>
            <button onclick="saveDuty()" class="flex-1 p-4 gradient-header text-white rounded-2xl font-bold">SAVE</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");
    const profDB = firebase.database().ref("staff_profiles");

    let appData = {}, allStaff = {}, selDate = "", currentKey = "";

    function login() {
        if(document.getElementById('loginPass').value === "9099020925") {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            initApp();
        } else { alert("ખોટો પાસવર્ડ!"); }
    }

    function initApp() {
        const today = new Date();
        selDate = today.toISOString().split('T')[0];
        generateDates();
        
        profDB.on('value', s => { allStaff = s.val() || {}; updateUI(); });
        db.on('value', s => { appData = s.val() || {}; updateUI(); });
    }

    function generateDates() {
        const scroll = document.getElementById('dateScroll');
        scroll.innerHTML = "";
        for(let i=-2; i<15; i++) {
            let d = new Date(); d.setDate(d.getDate() + i);
            let ds = d.toISOString().split('T')[0];
            let active = ds === selDate ? 'date-active' : 'bg-white/10';
            scroll.innerHTML += `<div onclick="changeDate('${ds}')" class="date-btn ${active}">
                ${d.getDate()}<br><small>${d.toLocaleString('en-us', {month:'short'})}</small>
            </div>`;
        }
    }

    function changeDate(d) { selDate = d; generateDates(); updateUI(); }

    function updateUI() {
        const container = document.getElementById('gridContainer');
        container.innerHTML = "";
        const depts = appData.Depts || ["EMERGENCY WARD", "OPD", "ADMIT WARD"];
        
        // Get already assigned staff names for this date to prevent duplicates
        const assignedNames = [];
        for(let k in appData) { if(k.startsWith(selDate)) assignedNames.push(appData[k]); }

        depts.forEach(dept => {
            let table = `<div class="mb-4">
                <div class="bg-gray-100 p-2 font-black text-xs text-blue-900 border-b">${dept}</div>
                <table class="excel-table w-full">
                    <tr class="bg-gray-50">
                        <th class="sticky-col">NAME</th>
                        <th>WARD</th>
                        <th>SHIFT</th>
                        <th>ACTION</th>
                    </tr>`;
            
            for(let i=1; i<=5; i++) { // Showing 5 slots per ward
                let key = `${selDate}_${dept}_${i}_Day`;
                let name = appData[key] || "---";
                table += `<tr>
                    <td class="sticky-col text-blue-700">${name}</td>
                    <td>${dept.split(' ')[0]}</td>
                    <td>DAY</td>
                    <td><button onclick="openModal('${key}')" class="text-blue-500 font-bold">Edit</button></td>
                </tr>`;
            }
            table += `</table><div class="h-4"></div></div>`; // 2 row gap
            container.innerHTML += table;
        });

        updatePendingList(assignedNames);
    }

    function updatePendingList(assignedNames) {
        const list = document.getElementById('pendingList');
        const pending = Object.values(allStaff).filter(s => !assignedNames.includes(s.name));
        
        if(pending.length > 0) {
            list.innerHTML = pending.map(s => `<span>• ${s.name}</span>`).join(' ');
        } else {
            list.innerHTML = "બધા સ્ટાફની ડ્યુટી સેટ થઈ ગઈ છે! ✅";
        }
    }

    function openModal(key) {
        currentKey = key;
        document.getElementById('modalInfo').innerText = key.split('_')[1] + " Assignment";
        document.getElementById('staffSearch').value = "";
        document.getElementById('assignModal').classList.remove('hidden');
        filterSuggestions("");
    }

    function closeModal() { document.getElementById('assignModal').classList.add('hidden'); }

    function filterSuggestions(val) {
        const box = document.getElementById('suggestBox');
        
        // Logic: Filter staff who are NOT already assigned today
        const assignedToday = [];
        for(let k in appData) { if(k.startsWith(selDate)) assignedToday.push(appData[k]); }

        const filtered = Object.values(allStaff).filter(s => 
            s.name.toLowerCase().includes(val.toLowerCase()) && 
            !assignedToday.includes(s.name)
        );

        if(filtered.length > 0) {
            box.innerHTML = filtered.map(s => `<div onclick="selectStaff('${s.name}')" class="p-3 border-b hover:bg-blue-50 cursor-pointer font-bold text-sm">${s.name}</div>`).join('');
            box.classList.remove('hidden');
        } else {
            box.innerHTML = `<div class="p-3 text-red-400 text-xs">કોઈ સ્ટાફ ખાલી નથી અથવા મળ્યો નથી</div>`;
            box.classList.remove('hidden');
        }
    }

    function selectStaff(name) {
        document.getElementById('staffSearch').value = name;
        document.getElementById('suggestBox').classList.add('hidden');
    }

    function saveDuty() {
        const name = document.getElementById('staffSearch').value;
        if(!name) return;
        db.child(currentKey).set(name).then(() => {
            closeModal();
            // Optional: Toast message can be added here
        });
    }

    function downloadDutyPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`Hospital Duty List - ${selDate}`, 14, 15);
        
        let rows = [];
        for(let k in appData) {
            if(k.startsWith(selDate)) {
                let p = k.split('_');
                rows.push([p[1], p[2], appData[k]]);
            }
        }

        doc.autoTable({
            startY: 25,
            head: [['Department', 'Slot', 'Staff Name']],
            body: rows,
        });
        doc.save(`Duty_${selDate}.pdf`);
    }
</script>

</body>
</html>
