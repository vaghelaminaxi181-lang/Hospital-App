<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANSKARDHAM VISION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #ffffff; }
        .vision-blue { background: #2563eb; }
        .input-box { border: 1px solid #e5e7eb; border-radius: 20px; padding: 18px; text-align: center; font-weight: 600; width: 100%; outline: none; background: #f9fafb; color: #1e293b; }
        .input-box::placeholder { color: #9ca3af; }
        
        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 50px; padding: 15px; position: fixed; z-index: 1000; left: 50%; bottom: 80px; transform: translateX(-50%); font-weight: 600; font-size: 13px; }
        #toast.show { visibility: visible; animation: fadeInOut 2.5s; }
        @keyframes fadeInOut { 0% { opacity: 0; bottom: 50px; } 20% { opacity: 1; bottom: 80px; } 80% { opacity: 1; bottom: 80px; } 100% { opacity: 0; bottom: 50px; } }
        
        .msg-bubble { max-width: 85%; padding: 12px; border-radius: 15px; margin-bottom: 10px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .msg-admin { background: #dcf8c6; align-self: flex-start; border-top-left-radius: 2px; }
    </style>
</head>
<body>

<div id="toast">સંદેશ...</div>

<div class="max-w-md mx-auto min-h-screen relative flex flex-col overflow-hidden bg-white">

    <div id="loginPage" class="absolute inset-0 z-[100] bg-white flex flex-col items-center justify-center px-8">
        <div class="mb-4">
            <img src="https://img.icons8.com/color/144/hospital-buildings.png" class="w-24 h-24 object-contain">
        </div>
        <h1 class="text-3xl font-black text-[#1e293b] tracking-tighter italic uppercase leading-none">SANSKARDHAM VISION</h1>
        <p class="text-[12px] font-bold text-gray-400 uppercase tracking-[3px] mt-2 mb-12">STAFF PORTAL</p>
        
        <div class="w-full space-y-4">
            <input type="text" id="l_id" placeholder="User ID" class="input-box">
            <input type="password" id="l_pass" placeholder="Password" class="input-box">
            <button onclick="handleLogin()" class="w-full bg-[#2563eb] text-white p-5 rounded-2xl font-black tracking-widest shadow-xl active:scale-95 transition-all uppercase mt-2">LOGIN</button>
        </div>
        
        <div class="absolute bottom-6">
            <p class="text-[10px] font-bold text-blue-900 opacity-30 tracking-[3px] uppercase">JATIN SOLANKI BY VISION</p>
        </div>
    </div>

    <div id="appBody" class="hidden flex flex-col flex-grow">
        <div class="bg-[#2563eb] text-white p-6 pb-14 rounded-b-[45px] shadow-lg sticky top-0 z-50">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">SANSKARDHAM</h1>
                    <p id="roleTag" class="text-[9px] font-black opacity-60 tracking-widest mt-1 uppercase">GUEST</p>
                </div>
                <div class="flex items-center space-x-2">
                    <button onclick="toggleShift()" id="shiftBtn" class="bg-white/20 p-2.5 rounded-2xl text-lg shadow-inner">☀️</button>
                    <button onclick="location.reload()" class="bg-white/20 p-2.5 rounded-2xl text-lg shadow-inner">🔄</button>
                </div>
            </div>
            <div class="bg-white/10 p-3 rounded-2xl flex items-center border border-white/20 backdrop-blur-md">
                <span class="mr-3">📅</span>
                <input type="date" id="appDate" onchange="refreshData()" class="bg-transparent font-bold outline-none text-white text-sm w-full cursor-pointer">
            </div>
        </div>

        <div id="menuView" class="px-6 -mt-8 space-y-6 pb-24">
            <div onclick="openNotice()" class="w-full bg-orange-500 p-5 rounded-[30px] shadow-lg flex items-center justify-between text-white active:scale-95 cursor-pointer">
                <div class="flex items-center space-x-4"><span>📢</span><span class="font-black text-sm uppercase tracking-wider">Notice Board</span></div>
                <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">VIEW</span>
            </div>
            <div id="gridArea" class="grid grid-cols-2 gap-4">
                </div>
        </div>

        <div id="slotView" class="hidden px-6 pt-6 space-y-4 pb-24">
            <div class="flex justify-between items-center">
                <button onclick="goHome()" class="text-blue-600 font-bold text-[10px] uppercase bg-blue-50 px-5 py-2 rounded-full border border-blue-100 shadow-sm">⬅ Back</button>
                <button onclick="downloadDuty()" class="bg-green-600 text-white font-bold text-[10px] uppercase px-5 py-2 rounded-full shadow-md active:scale-95 transition-all">📥 Download</button>
            </div>
            <div id="captureArea" class="bg-white p-5 rounded-[35px] border border-gray-100">
                <div class="text-center mb-5 border-b pb-4">
                    <h2 id="vTitle" class="text-2xl font-black text-slate-800 uppercase italic leading-none"></h2>
                    <p id="vSub" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-2"></p>
                </div>
                <div id="slotContainer" class="space-y-3"></div>
            </div>
        </div>

        <div id="noticeView" class="hidden flex-grow flex flex-col bg-[#F0F2F5] pb-24">
            <div class="bg-[#2563eb] p-4 text-white flex items-center space-x-4">
                <button onclick="goHome()" class="text-xl">←</button>
                <span class="font-bold">Hospital Notices</span>
            </div>
            <div id="noticeList" class="flex-grow p-4 overflow-y-auto flex flex-col"></div>
            
            <div id="adminPanel" class="hidden p-3 bg-white border-t flex flex-col space-y-2 fixed bottom-0 w-full max-w-md z-50">
                <div class="flex space-x-2">
                    <input type="text" id="msgText" placeholder="સૂચના લખો..." class="flex-grow p-3 bg-gray-100 rounded-2xl outline-none text-sm font-semibold">
                    <button onclick="sendMsg('text')" class="bg-blue-600 text-white p-3 rounded-2xl px-5 font-black text-xs uppercase shadow-md">Send</button>
                </div>
                <div class="flex justify-around py-1 border-t mt-1 pt-2">
                    <label class="text-[10px] font-black text-blue-600 cursor-pointer">📸 PHOTO <input type="file" accept="image/*" class="hidden" onchange="handleFile('image', this)"></label>
                    <label class="text-[10px] font-black text-red-600 cursor-pointer">📄 PDF <input type="file" accept=".pdf" class="hidden" onchange="handleFile('pdf', this)"></label>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-[300] flex items-center justify-center p-8 backdrop-blur-sm">
        <div class="bg-white w-full rounded-[40px] p-8 shadow-2xl">
            <h3 class="font-black text-center mb-6 uppercase text-sm tracking-widest text-blue-900 border-b pb-3">Set Duty</h3>
            <input type="text" id="nameInp" placeholder="નામ લખો..." class="w-full p-4 bg-gray-50 rounded-2xl font-bold text-center mb-6 border-2 border-gray-100 outline-none focus:border-blue-400">
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 p-4 bg-gray-100 rounded-2xl font-bold text-gray-400 text-[10px] uppercase">Cancel</button>
                <button onclick="saveDuty()" class="flex-1 bg-[#2563eb] text-white rounded-2xl font-black text-[10px] uppercase shadow-lg p-4">Save</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");
    const nDB = firebase.database().ref("hospital_notices_v2");

    let role = "staff", shift = "Day", date = "", mainData = {}, activeKey = "";

    function msg(t) {
        const x = document.getElementById("toast");
        x.innerText = t; x.className = "show";
        setTimeout(() => { x.className = ""; }, 2500);
    }

    function handleLogin() {
        const id = document.getElementById('l_id').value.trim();
        const pw = document.getElementById('l_pass').value;
        
        if (id === "ssgd" && pw === "9099020925") { role = "admin"; launch(); }
        else if (id === "ssgd" && pw === "9712284024") { role = "staff"; launch(); }
        else { msg("ID અથવા પાસવર્ડ ખોટો છે!"); }
    }

    function launch() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('appBody').classList.remove('hidden');
        date = new Date().toISOString().split('T')[0];
        document.getElementById('appDate').value = date;
        document.getElementById('roleTag').innerText = role === 'admin' ? "👑 ADMIT ACCESS" : "👀 STAFF VIEW";
        if(role === 'admin') document.getElementById('adminPanel').classList.remove('hidden');
        
        db.on('value', (s) => { 
            mainData = s.val() || {}; 
            if(!document.getElementById('slotView').classList.contains('hidden')) {
                renderSlots(document.getElementById('vTitle').innerText);
            }
        });
        renderGrid();
        msg("સ્વાગત છે!");
    }

    function renderGrid() {
        const depts = ["OPD", "OFF LIST", "EMERGENCY", "DAYCARE", "ICU", "WARD"];
        const icons = {"OPD":"🏥", "OFF LIST":"😴", "EMERGENCY":"🚑", "DAYCARE":"🏥", "ICU":"🏥", "WARD":"🏢"};
        const area = document.getElementById('gridArea'); area.innerHTML = "";
        depts.forEach(d => {
            area.innerHTML += `<div onclick="openDept('${d}')" class="bg-white p-8 rounded-[35px] border border-gray-100 flex flex-col items-center justify-center cursor-pointer active:scale-95 shadow-sm transition-all"><span class="text-4xl mb-3">${icons[d]}</span><span class="font-black text-slate-700 text-[10px] uppercase tracking-wider">${d}</span></div>`;
        });
    }

    function openDept(d) {
        document.getElementById('menuView').classList.add('hidden');
        document.getElementById('slotView').classList.remove('hidden');
        document.getElementById('vTitle').innerText = d;
        renderSlots(d);
    }

    function renderSlots(d) {
        document.getElementById('vSub').innerText = `${shift.toUpperCase()} SHIFT | ${date}`;
        const cont = document.getElementById('slotContainer'); cont.innerHTML = "";
        const limit = (d === "OPD" || d === "WARD") ? 10 : 8;
        for(let i=1; i<=limit; i++) {
            let k = `${date}_${d}_${i}_${shift}`;
            let val = mainData[k] || "---";
            cont.innerHTML += `<div onclick="${role === 'admin' ? `editSlot('${k}')` : ''}" class="p-5 bg-gray-50 rounded-2xl flex justify-between items-center border-l-4 border-blue-600 active:bg-blue-100 transition-all shadow-sm">
                <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Slot ${i}</span>
                <span class="font-bold text-blue-900">${val}</span>
            </div>`;
        }
    }

    function editSlot(k) { activeKey = k; document.getElementById('nameInp').value = (mainData[k] && mainData[k] !== "---") ? mainData[k] : ""; document.getElementById('editModal').classList.remove('hidden'); }
    function saveDuty() { const n = document.getElementById('nameInp').value.trim() || "---"; db.child(activeKey).set(n).then(() => { closeModal(); msg("સેવ થઈ ગયું!"); }); }
    function closeModal() { document.getElementById('editModal').classList.add('hidden'); }

    function downloadDuty() {
        msg("ડાઉનલોડ થઈ રહ્યું છે...");
        html2canvas(document.querySelector("#captureArea")).then(canvas => {
            let link = document.createElement('a'); link.download = `Duty_${date}.png`;
            link.href = canvas.toDataURL(); link.click();
            msg("ફોટો સેવ થયો!");
        });
    }

    function openNotice() { document.getElementById('menuView').classList.add('hidden'); document.getElementById('noticeView').classList.remove('hidden'); listenNotices(); }
    function goHome() { document.getElementById('slotView').classList.add('hidden'); document.getElementById('noticeView').classList.add('hidden'); document.getElementById('menuView').classList.remove('hidden'); }

    function listenNotices() {
        nDB.on('value', (snap) => {
            const list = document.getElementById('noticeList'); list.innerHTML = "";
            const data = snap.val(); if(!data) return;
            Object.keys(data).forEach(id => {
                const n = data[id];
                let body = n.type === 'text' ? `<p class="font-bold">${n.content}</p>` : n.type === 'image' ? `<img src="${n.content}" class="rounded-lg max-h-60 w-full object-cover">` : `<div class="p-2 bg-red-50 text-red-600 font-bold rounded-lg text-xs">📄 PDF FILE</div>`;
                list.innerHTML += `<div class="msg-bubble msg-admin self-start shadow-sm">
                    ${body}<p class="text-[8px] opacity-50 mt-2 text-right">${n.time}</p>
                    ${role === 'admin' ? `<button onclick="delN('${id}')" class="text-[8px] text-red-400 font-bold mt-2 pt-1 border-t w-full text-left uppercase">Delete</button>` : ''}
                </div>`;
            });
            list.scrollTop = list.scrollHeight;
        });
    }

    function sendMsg(type, content = "") {
        const txt = document.getElementById('msgText').value.trim();
        if(!txt && type === 'text') return;
        nDB.push({ type, content: type === '
