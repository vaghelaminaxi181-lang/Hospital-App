<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Staff & Leave Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --leave-bg: #ffeaea; --leave-text: #d63031; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        
        .sidenav { height: 100%; width: 0; position: fixed; z-index: 100; top: 0; left: 0; background: var(--primary); overflow-x: hidden; transition: 0.5s; padding-top: 20px; }
        .menu-row { padding: 15px; border-bottom: 1px solid #455a64; color: white; }
        .sidenav input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        
        header { background: var(--accent); color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .menu-icon { font-size: 25px; cursor: pointer; }

        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-add { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #34495e; color: white; }
        
        /* Leave Style */
        .leave-row { background-color: var(--leave-bg); color: var(--leave-text); font-weight: bold; }
        
        .download-group { display: flex; gap: 10px; margin-top: 20px; padding: 0 20px; }
        .btn-dl { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; color: white; font-weight: bold; }
        
        .alert-item { background: #fff5f5; color: #c0392b; padding: 10px; margin-top: 5px; border-radius: 6px; border-left: 5px solid #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <span style="position:absolute;top:10px;right:20px;color:white;cursor:pointer;font-size:30px;" onclick="closeNav()">&times;</span>
    <div class="menu-row">
        <h4>👤 નવો સ્ટાફ</h4>
        <input type="text" id="newStaffName" placeholder="નામ">
        <input type="number" id="newStaffRoll" placeholder="રોલ નંબર">
        <button style="background:#e67e22; color:white; border:none; padding:10px; width:90%; cursor:pointer;" onclick="saveStaff()">સેવ સ્ટાફ</button>
    </div>
</div>

<header>
    <span class="menu-icon" onclick="openNav()">&#9776; મેનુ</span>
    <span>હોસ્પિટલ ડ્યુટી & લીવ મેનેજર</span>
</header>

<div class="container">
    <div class="card">
        <h3>📅 ડ્યુટી / રજા સેટ કરો</h3>
        <label>સ્ટાફ:</label>
        <select id="staffSelect"></select>
        
        <label>શિફ્ટ / સ્ટેટસ:</label>
        <select id="shiftSelect">
            <option value="☀️ Day Shift">☀️ Day Shift (સવાર)</option>
            <option value="🌙 Night Shift">🌙 Night Shift (રાત)</option>
            <option value="🏥 Full Day">🏥 Full Day (આખો દિવસ)</option>
            <option value="🚩 ON LEAVE">🚩 ON LEAVE (રજા પર)</option>
        </select>
        
        <label>વિભાગ (રજા હોય તો 'None' રાખો):</label>
        <select id="deptSelect">
            <option value="ICU">ICU</option>
            <option value="OPD">OPD</option>
            <option value="General Ward">General Ward</option>
            <option value="OT">OT</option>
            <option value="-">-</option>
        </select>
        
        <label>તારીખ:</label>
        <input type="date" id="dutyDate">
        
        <button class="btn-add" onclick="assignDuty()">કન્ફર્મ કરો</button>
    </div>

    <div class="card">
        <h3 style="color: #e74c3c;">🚨 બાકી સ્ટાફ (Missing)</h3>
        <div id="missingStaffList"></div>
    </div>
</div>

<div style="padding: 20px;">
    <div class="card" id="captureArea">
        <h2 style="text-align: center;">હોસ્પિટલ ડ્યુટી રિપોર્ટ</h2>
        <table id="dutyTable">
            <thead>
                <tr>
                    <th>નામ (રોલ)</th>
                    <th>વિભાગ</th>
                    <th>શિફ્ટ / રજા</th>
                    <th>તારીખ</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="download-group">
        <button class="btn-dl" style="background: #27ae60;" onclick="dlExcel()">Excel</button>
        <button class="btn-dl" style="background: #c0392b;" onclick="dlPDF()">PDF</button>
        <button class="btn-dl" style="background: #8e44ad;" onclick="dlImage()">Image</button>
    </div>
</div>

<script>
    let masterStaff = []; 
    let assigned = [];

    function openNav() { document.getElementById("mySidenav").style.width = "300px"; }
    function closeNav() { document.getElementById("mySidenav").style.width = "0"; }

    function saveStaff() {
        let n = document.getElementById("newStaffName").value;
        let r = document.getElementById("newStaffRoll").value;
        if(n && r) {
            masterStaff.push({name:n, roll:r});
            updateUI();
            closeNav();
        }
    }

    function updateUI() {
        let sSel = document.getElementById("staffSelect");
        let miss = document.getElementById("missingStaffList");
        sSel.innerHTML = "<option value=''>-- પસંદ કરો --</option>";
        miss.innerHTML = "";

        masterStaff.forEach(s => {
            let opt = document.createElement("option");
            opt.value = s.name; opt.text = s.name; sSel.appendChild(opt);
            if(!assigned.includes(s.name)) {
                miss.innerHTML += `<div class="alert-item">❌ ${s.name}</div>`;
            }
        });
    }

    function assignDuty() {
        let n = document.getElementById("staffSelect").value;
        let d = document.getElementById("deptSelect").value;
        let sh = document.getElementById("shiftSelect").value;
        let dt = document.getElementById("dutyDate").value;

        if(!n || !dt) return alert("વિગત ભરો!");
        if(!assigned.includes(n)) assigned.push(n);
        
        let sObj = masterStaff.find(i => i.name === n);
        let table = document.getElementById("dutyTable").querySelector("tbody");
        let row = table.insertRow();
        
        // જો રજા હોય તો લાલ કલર આપવો
        if(sh.includes("LEAVE")) {
            row.className = "leave-row";
        }
        
        row.innerHTML = `
            <td><b>${n}</b> (${sObj.roll})</td>
            <td>${d}</td>
            <td>${sh}</td>
            <td>${dt}</td>
        `;
        updateUI();
    }

    function dlExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("dutyTable")), "Duty_Report.xlsx"); }
    function dlPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.autoTable({ html: '#dutyTable' });
        doc.save("Duty_Report.pdf");
    }
    function dlImage() {
        html2canvas(document.getElementById("captureArea")).then(canvas => {
            let link = document.createElement('a');
            link.download = 'Duty_Report.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
    updateUI();
</script>

</body>
</html>
