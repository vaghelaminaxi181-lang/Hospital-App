<!DOCTYPE html>
<html>
<head>
  <title>Hospital Duty App</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
    }

    header {
      background: linear-gradient(to right, #1e40af, #3b82f6);
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    .slot {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 5px;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h2>🏥 SANSKARDHAM VISION</h2>
</header>

<div class="container">

  <!-- Login -->
  <div id="loginBox">
    <input id="id" placeholder="ID"><br>
    <input id="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>

  <!-- Main App -->
  <div id="app" style="display:none;">

    <input type="date" id="datePicker" onchange="loadDuty()">

    <button onclick="toggleShift()">Toggle Shift</button>

    <h3 id="shiftText">Shift: Day</h3>

    <div id="dutyList"></div>

    <h3>📢 Notice</h3>
    <input id="noticeText" placeholder="Enter notice">
    <button onclick="addNotice()">Add</button>

    <div id="noticeList"></div>

  </div>

</div>

<script>
  // Firebase Config
  const firebaseConfig = {
    databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let role = "";
  let shift = "Day";

  function login() {
    const id = document.getElementById("id").value;
    const pass = document.getElementById("password").value;

    if (id === "ssgd" && pass === "9099020925") {
      role = "admin";
    } else if (id === "ssgd" && pass === "9712284024") {
      role = "staff";
    } else {
      showToast("Invalid Login ❌");
      return;
    }

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").style.display = "block";

    loadDuty();
    loadNotice();
  }

  function toggleShift() {
    shift = (shift === "Day") ? "Night" : "Day";
    document.getElementById("shiftText").innerText = "Shift: " + shift;
    loadDuty();
  }

  function getKey(dept, slot) {
    const date = document.getElementById("datePicker").value;
    return `${date}_${dept}_${slot}_${shift}`;
  }

  function loadDuty() {
    const container = document.getElementById("dutyList");
    container.innerHTML = "";

    const depts = ["OPD", "ICU", "WARD"];

    depts.forEach(dept => {
      for (let i = 1; i <= 3; i++) {
        const key = getKey(dept, i);

        db.ref("hospital_v11_final/" + key).on("value", snap => {
          const name = snap.val() || "Empty";

          let div = document.createElement("div");
          div.className = "slot";
          div.innerText = `${dept} Slot ${i}: ${name}`;

          div.onclick = () => editSlot(key);

          container.appendChild(div);
        });
      }
    });
  }

  function editSlot(key) {
    if (role !== "admin") return;

    const name = prompt("Enter Name:");
    if (name) {
      db.ref("hospital_v11_final/" + key).set(name);
      showToast("Saved ✅");
    }
  }

  function addNotice() {
    if (role !== "admin") return;

    const text = document.getElementById("noticeText").value;

    const notice = {
      text: text,
      date: new Date().toLocaleDateString(),
      time: new Date().toLocaleTimeString()
    };

    db.ref("hospital_notices_v2").push(notice);
    showToast("Notice Added 📢");
  }

  function loadNotice() {
    db.ref("hospital_notices_v2").on("value", snap => {
      const data = snap.val();
      const container = document.getElementById("noticeList");
      container.innerHTML = "";

      for (let key in data) {
        const n = data[key];
        let div = document.createElement("div");
        div.innerText = `${n.text} (${n.date} ${n.time})`;
        container.appendChild(div);
      }
    });
  }

  function showToast(msg) {
    const toast = document.createElement("div");
    toast.innerText = msg;
    toast.className = "toast";
    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 3000);
  }
</script>

</body>
</html>
