<!doctype html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Hospital | Vision v2.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .sidebar { transition: 0.3s; position: fixed; top: 0; left: -280px; height: 100%; width: 280px; background: white; z-index: 1000; box-shadow: 10px 0 20px rgba(0,0,0,0.1); }
        .sidebar.open { left: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
        .btn-active:active { transform: scale(0.95); }
        .dept-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .dept-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.1); }
        .suggestion-box { position: absolute; width: 100%; background: white; border: 1px solid #e2e8f0; border-radius: 12px; max-height: 150px; overflow-y: auto; z-index: 3000; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .suggestion-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; font-weight: 600; font-size: 13px; }
        .suggestion-item:hover { background-color: #eff6ff; color: #1e40af; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar p-6 flex flex-col">
    <div class="mb-8 border-b pb-4">
        <h2 class="text-xl font-black text-blue-900">SANSKARDHAM</h2>
        <p data-key="nav" class="text-[10px] font-bold text-gray-400 tracking-widest uppercase">Navigation</p>
    </div>
    <nav class="space-y-2 flex-grow">
        <button onclick="showSection('profileSection')" class="w-full text-left p-4 rounded-xl hover:bg-blue-50 flex items-center space-x-3 font-bold text-gray-700"><i data-lucide="user-circle" class="w-5 h-5"></i> <span data-key="myProfile">My Profile</span></button>
        <button onclick="showSection('dutySection')" class="w-full text-left p-4 rounded-xl hover:bg-blue-50 flex items-center space-x-3 font-bold text-gray-700"><i data-lucide="calendar-range" class="w-5 h-5"></i> <span data-key="dutyBoard">Duty Board</span></button>
        
        <div id="adminMenu" class="hidden pt-4 border-t mt-4 space-y-2">
            <p data-key="adminPanel" class="text-[9px] font-bold text-blue-600 uppercase px-4">Admin Panel</p>
            <button onclick="showSection('staffListSection'); loadStaffRecords();" class="w-full text-left p-4 rounded-xl bg-blue-50 text-blue-700 flex items-center space-x-3 font-bold"><i data-lucide="users" class="w-5 h-5"></i> <span data-key="staffRecords">Staff Records</span></button>
            <button onclick="showSection('fullDutySection'); loadFullDutyRecords();" class="w-full text-left p-4 rounded-xl bg-blue-600 text-white flex items-center space-x-3 font-bold shadow-md"><i data-lucide="clipboard-list" class="w-5 h-5"></i> <span data-key="fullDutyList">Full Duty List</span></button>
        </div>
    </nav>
    <button onclick="toggleLanguage()" class="mb-2 p-3 bg-blue-100 rounded-xl font-bold text-blue-700 text-xs text-center uppercase">🌐 English / ગુજરાતી</button>
    <button onclick="location.reload()" data-key="logout" class="p-4 bg-red-50 rounded-xl font-bold text-red-500 text-xs text-center uppercase">Logout</button>
</div>

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-2xl relative">
    <header class="gradient-header text-white p-6 rounded-b-[40px] sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button id="menuBtn" onclick="toggleMenu()" class="text-2xl hidden"><i data-lucide="menu"></i></button>
                <div>
                    <h1 class="text-xl font-black uppercase leading-none">Sanskardham</h1>
                    <p class="text-[9px] font-bold text-blue-200 tracking-widest uppercase">Vision v2.0</p>
                </div>
            </div>
            <div id="roleBadge" class="hidden bg-white/20 px-3 py-1 rounded-xl text-[10px] font-bold uppercase">Guest</div>
        </div>
        <div id="dateArea" class="hidden mt-4 flex items-center bg-black/10 rounded-2xl px-4 py-2">
            <input type="date" id="dateInput" onchange="refreshData()" class="bg-transparent text-white font-bold outline-none text-sm w-full">
            <button onclick="toggleShift()" id="shiftIco" class="ml-2 bg-white/20 p-1 rounded-lg">☀️</button>
        </div>
    </header>

    <main class="flex-grow p-4">
        <div id="loginPage" class="flex flex-col justify-center space-y-5 py-20">
            <div class="text-center">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"><i data-lucide="hospital" class="w-10 h-10 text-blue-600"></i></div>
                <h2 data-key="staffPortal" class="text-2xl font-black text-gray-800 tracking-tight">Staff Portal</h2>
            </div>
            <div class="space-y-3">
                <input type="text" id="loginID" data-placeholder="userId" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold focus:ring-2 focus:ring-blue-600">
                <input type="password" id="loginPass" data-placeholder="password" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold focus:ring-2 focus:ring-blue-600">
            </div>
            <button onclick="login()" data-key="login" class="w-full gradient-header text-white p-5 rounded-2xl font-bold btn-active shadow-xl uppercase tracking-widest">Login</button>
        </div>

        <div id="dutySection" class="hidden space-y-6">
            <div class="relative">
                <input type="text" id="searchBar" onkeyup="searchName()" data-placeholder="searchDutyPlaceholder" class="w-full p-4 pl-12 rounded-2xl border border-gray-100 shadow-sm outline-none font-bold">
                <i data-lucide="search" class="absolute left-4 top-4 text-gray-400 w-5 h-5"></i>
            </div>
            <div id="searchRes" class="hidden p-4 rounded-2xl font-bold text-center"></div>
            <div id="deptGrid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="staffListSection" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-blue-50 space-y-3">
                <h2 data-key="staffRecords" class="text-2xl font-black text-blue-900">Staff Records</h2>
                <input type="text" id="staffSearch" onkeyup="filterStaffTable()" data-placeholder="searchPlaceholder" class="w-full p-3 bg-gray-50 rounded-xl text-xs font-bold border outline-none">
            </div>
            <div class="overflow-x-auto bg-white rounded-2xl shadow-sm border border-blue-50">
                <table class="w-full text-left border-collapse min-w-[500px]">
                    <thead class="bg-blue-50 text-blue-800 text-[10px] uppercase font-black">
                        <tr><th class="p-3">ID</th><th data-key="tName" class="p-3">Name</th><th data-key="tMobile" class="p-3">Mobile</th><th data-key="tExp" class="p-3">Exp</th></tr>
                    </thead>
                    <tbody id="staffListCont" class="text-[11px] font-bold text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div id="fullDutySection" class="hidden space-y-4">
             <div class="bg-white p-4 rounded-3xl shadow-sm border border-blue-50 space-y-3">
                <h2 data-key="dutyReport" class="text-xl font-black text-blue-900 uppercase italic">Duty Report</h2>
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="fStart" class="p-2 bg-gray-50 border rounded-xl text-xs font-bold">
                    <input type="date" id="fEnd" class="p-2 bg-gray-50 border rounded-xl text-xs font-bold">
                </div>
                <button onclick="loadFullDutyRecords()" data-key="filterList" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold text-xs uppercase">Filter</button>
            </div>
            <div class="overflow-x-auto bg-white rounded-2xl shadow-sm border border-blue-50">
                <table class="w-full text-left border-collapse min-w-[450px]">
                    <thead class="bg-slate-100 text-blue-900 text-[10px] uppercase font-black">
                        <tr><th data-key="tDate" class="p-3">Date</th><th data-key="tName" class="p-3">Staff</th><th data-key="tDept" class="p-3">Dept</th><th data-key="tShift" class="p-3">Shift</th></tr>
                    </thead>
                    <tbody id="fullDutyCont" class="text-[11px] font-bold text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div id="profileSection" class="hidden space-y-4">
            <h2 data-key="myProfile" class="text-2xl font-black text-blue-900">My Profile</h2>
            <div class="bg-white p-6 rounded-3xl border border-blue-50 shadow-sm space-y-4">
                <input type="text" id="pName" data-placeholder="fullName" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <input type="text" id="pID" data-placeholder="idNumber" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <button onclick="saveProfile()" data-key="saveProfile" class="w-full gradient-header text-white p-4 rounded-2xl font-bold uppercase">Save</button>
            </div>
        </div>

        <div id="listPage" class="hidden space-y-4">
            <button onclick="showSection('dutySection')" data-key="backBtn" class="text-blue-600 font-bold text-xs flex items-center"><i data-lucide="chevron-left" class="w-4 h-4 mr-1"></i> BACK</button>
            <div class="text-center bg-blue-50 py-4 rounded-3xl">
                <h2 id="lTitle" class="text-2xl font-black text-blue-900 uppercase italic"></h2>
                <p id="lSub" class="text-[10px] font-bold text-blue-400 tracking-[3px] mt-1"></p>
            </div>
            <div id="lBody" class="space-y-3"></div>
        </div>
    </main>

    <footer class="p-4 flex justify-center border-t bg-white">
        <p class="text-blue-900 font-black text-[10px] tracking-[5px] opacity-60 uppercase">JATIN SOLANKI</p>
    </footer>
</div>

<div id="rangeModal" class="hidden fixed inset-0 bg-black/70 z-[2000] flex items-center justify-center p-6 backdrop-blur-md">
    <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
        <h3 data-key="setDutySlot" class="font-black text-center border-b pb-3 mb-5 text-blue-900 uppercase">Set Duty Slot</h3>
        <div class="space-y-4 mb-6">
            <div class="flex space-x-3">
                <div class="flex-1"><label data-key="startDate" class="text-[9px] font-bold text-gray-400">START</label><input type="date" id="rStart" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold"></div>
                <div class="flex-1"><label data-key="endDate" class="text-[9px] font-bold text-gray-400">END</label><input type="date" id="rEnd" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold"></div>
            </div>
            <div class="relative">
                <label data-key="tName" class="text-[9px] font-bold text-gray-400">STAFF NAME</label>
                <input type="text" id="rStaff" onkeyup="showSuggestions(this.value)" data-placeholder="typeHere" class="w-full p-4 bg-blue-50 rounded-2xl font-bold text-center outline-none border border-blue-100">
                <div id="staffSuggestions" class="suggestion-box hidden"></div>
            </div>
        </div>
        <div class="flex space-x-3">
            <button onclick="closeModal()" data-key="cancel" class="flex-1 p-4 bg-gray-100 rounded-2xl font-bold text-gray-500 text-xs uppercase">CANCEL</button>
            <button onclick="saveRangeDuty()" data-key="saveDuty" class="flex-1 p-4 gradient-header text-white rounded-2xl font-bold text-xs uppercase">SAVE</button>
        </div>
    </div>
</div>

<script>
    // Configuration
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");
    const profDB = firebase.database().ref("staff_profiles");

    let role = "viewer", shift = "Day", selDate = "", appData = {}, currentLang = "gu", allStaff = [];

    // Dictionary
    const translations = {
        en: {
            nav: "Navigation", myProfile: "My Profile", dutyBoard: "Duty Board", adminPanel: "Admin Panel", staffRecords: "Staff Records", fullDutyList: "Full Duty List", logout: "Logout", staffPortal: "Staff Portal", userId: "User ID", password: "Password", login: "Login", dutyReport: "Duty Report", startDate: "START DATE", endDate: "END DATE", filterList: "Filter List", tDate: "Date", tName: "Staff Name", tDept: "Dept", tShift: "Shift", tMobile: "Mobile", tExp: "Exp", searchPlaceholder: "Search ID/Name...", fullName: "Full Name", idNumber: "ID Number", saveProfile: "Save Profile", searchDutyPlaceholder: "Search duty by name...", backBtn: "BACK", setDutySlot: "Set Duty Slot", typeHere: "Type staff name...", cancel: "CANCEL", saveDuty: "SAVE DUTY", msgWrongPass: "Incorrect Password!", msgNotFound: "⚠️ Name not found."
        },
        gu: {
            nav: "નેવિગેશન", myProfile: "મારી પ્રોફાઇલ", dutyBoard: "ડ્યુટી બોર્ડ", adminPanel: "એડમિન પેનલ", staffRecords: "સ્ટાફ રેકોર્ડ્સ", fullDutyList: "આખી યાદી", logout: "લોગઆઉટ", staffPortal: "સ્ટાફ પોર્ટલ", userId: "યુઝર ID", password: "પાસવર્ડ", login: "લોગિન", dutyReport: "ડ્યુટી રિપોર્ટ", startDate: "શરૂઆત", endDate: "અંતિમ", filterList: "ફિલ્ટર", tDate: "તારીખ", tName: "સ્ટાફનું નામ", tDept: "વિભાગ", tShift: "શિફ્ટ", tMobile: "મોબાઈલ", tExp: "અનુભવ", searchPlaceholder: "નામ/ID શોધો...", fullName: "પૂરું નામ", idNumber: "ID નંબર", saveProfile: "પ્રોફાઇલ સેવ કરો", searchDutyPlaceholder: "નામથી ડ્યુટી શોધો...", backBtn: "પાછા જાઓ", setDutySlot: "ડ્યુટી સેટ કરો", typeHere: "નામ લખો...", cancel: "રદ કરો", saveDuty: "સેવ કરો", msgWrongPass: "ખોટો પાસવર્ડ!", msgNotFound: "⚠️ નામ મળ્યું નથી."
        }
    };

    // Modern Icon Logic
    function getDeptIcon(deptName) {
        const d = deptName.toUpperCase();
        if(d.includes("OPD")) return "stethoscope";
        if(d.includes("EMERGENCY") || d.includes("ER")) return "ambulance";
        if(d.includes("OFF")) return "moon";
        if(d.includes("ICU")) return "activity";
        if(d.includes("OT")) return "scissors";
        if(d.includes("WARD")) return "bed";
        return "hospital"; 
    }

    function toggleLanguage() {
        currentLang = (currentLang === "en") ? "gu" : "en";
        updateLanguageUI();
    }

    function updateLanguageUI() {
        const t = translations[currentLang];
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = t[el.getAttribute('data-key')]);
        document.querySelectorAll('[data-placeholder]').forEach(el => el.placeholder = t[el.getAttribute('data-placeholder')]);
        lucide.createIcons();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
        lucide.createIcons();
    }

    function showSection(id) {
        const ids = ['loginPage', 'profileSection', 'dutySection', 'listPage', 'staffListSection', 'fullDutySection'];
        ids.forEach(x => document.getElementById(x).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
        lucide.createIcons();
    }

    function login() {
        const id = document.getElementById('loginID').value.trim();
        const p = document.getElementById('loginPass').value;
        if(id === "ssgd" && (p === "9099020925" || p === "9712284024")) {
            role = (p === "9099020925") ? "admin" : "viewer";
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('menuBtn').classList.remove('hidden');
            document.getElementById('dateArea').classList.remove('hidden');
            document.getElementById('roleBadge').classList.remove('hidden');
            document.getElementById('roleBadge').innerText = role;
            if(role === 'admin') {
                document.getElementById('adminMenu').classList.remove('hidden');
                fetchAllStaff();
            }
            selDate = new Date().toISOString().split('T')[0];
            document.getElementById('dateInput').value = selDate;
            showSection('dutySection');
            syncData();
            updateLanguageUI();
        } else {
            alert(translations[currentLang].msgWrongPass);
        }
    }

    function fetchAllStaff() {
        profDB.on('value', (s) => {
            const data = s.val();
            allStaff = data ? Object.values(data).map(x => x.name) : [];
        });
    }

    function syncData() {
        db.on('value', (s) => {
            appData = s.val() || { "Depts": ["OPD", "EMERGENCY", "OFF LIST"] };
            renderGrid();
        });
    }

    function renderGrid() {
        const grid = document.getElementById('deptGrid');
        grid.innerHTML = "";
        const depts = appData.Depts || ["OPD", "EMERGENCY", "OFF LIST"];
        depts.forEach(d => {
            const icon = getDeptIcon(d);
            grid.innerHTML += `
            <div onclick="openSlots('${d}')" class="dept-card p-6 bg-white rounded-[30px] flex flex-col items-center btn-active cursor-pointer">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center mb-3 text-blue-600">
                    <i data-lucide="${icon}"></i>
                </div>
                <span class="font-black text-blue-900 text-[11px] uppercase text-center">${d}</span>
            </div>`;
        });
        lucide.createIcons();
    }

    function openSlots(d) {
        showSection('listPage');
        document.getElementById('lTitle').innerText = d;
        document.getElementById('lSub').innerText = `${shift} | ${selDate}`;
        let h = "";
        const limit = (d === 'OPD') ? 10 : 6;
        for(let i=1; i<=limit; i++) {
            let key = `${selDate}_${d}_${i}_${shift}`;
            let val = appData[key] || "---";
            const handler = role === 'admin' ? `onclick="openRangeModal('${key}')"` : "";
            h += `<div class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center border-l-4 border-blue-600 shadow-sm">
                <span class="text-[10px] font-bold text-gray-400 uppercase">Slot ${i}</span>
                <span ${handler} class="${role==='admin'?'cursor-pointer text-blue-600 underline font-black':'font-black text-gray-800'}">${val}</span>
            </div>`;
        }
        document.getElementById('lBody').innerHTML = h;
    }

    function openRangeModal(key) {
        editKey = key;
        const parts = key.split('_');
        document.getElementById('rStaff').value = (appData[key] === "---") ? "" : appData[key];
        document.getElementById('rStart').value = parts[0];
        document.getElementById('rEnd').value = parts[0];
        document.getElementById('rangeModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('rangeModal').classList.add('hidden'); }

    function saveRangeDuty() {
        const name = document.getElementById('rStaff').value.trim() || "---";
        const start = new Date(document.getElementById('rStart').value);
        const end = new Date(document.getElementById('rEnd').value);
        const parts = editKey.split('_');
        let updates = {};
        let temp = new Date(start);
        while(temp <= end) {
            let dStr = temp.toISOString().split('T')[0];
            let k = `${dStr}_${parts[1]}_${parts[2]}_${parts[3]}`;
            updates[k] = name;
            temp.setDate(temp.getDate() + 1);
        }
        db.update(updates).then(() => { closeModal(); openSlots(parts[1]); });
    }

    function showSuggestions(val) {
        const box = document.getElementById('staffSuggestions');
        if (!val) { box.classList.add('hidden'); return; }
        const filtered = allStaff.filter(name => name.toLowerCase().includes(val.toLowerCase()));
        if (filtered.length > 0) {
            box.innerHTML = filtered.map(name => `<div class="suggestion-item" onclick="selectStaff('${name}')">${name}</div>`).join('');
            box.classList.remove('hidden');
        } else { box.classList.add('hidden'); }
    }
    function selectStaff(name) { document.getElementById('rStaff').value = name; document.getElementById('staffSuggestions').classList.add('hidden'); }

    function toggleShift() {
        shift = (shift === "Day") ? "Night" : "Day";
        document.getElementById('shiftIco').innerText = (shift === "Day") ? "☀️" : "🌙";
        refreshData();
    }
    function refreshData() {
        selDate = document.getElementById('dateInput').value;
        if(!document.getElementById('listPage').classList.contains('hidden')) openSlots(document.getElementById('lTitle').innerText);
    }
    function searchName() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        let foundDep = "";
        if(!q) { document.getElementById('searchRes').classList.add('hidden'); return; }
        for(let k in appData) { if(k.startsWith(selDate) && k.endsWith(shift) && appData[k].toLowerCase().includes(q)) { foundDep = k.split('_')[1]; break; } }
        const resDiv = document.getElementById('searchRes');
        resDiv.classList.remove('hidden');
        resDiv.innerHTML = foundDep ? `✅ ${translations[currentLang].msgDutyIn || 'Duty in'} ${foundDep}` : translations[currentLang].msgNotFound;
        resDiv.className = `p-4 rounded-2xl font-bold text-center ${foundDep?'bg-green-50 text-green-700':'bg-red-50 text-red-700'}`;
    }

    // Load Icons
    lucide.createIcons();
</script>
</body>
</html>
