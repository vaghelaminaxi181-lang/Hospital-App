<!doctype html> <html lang="gu"> <head>   <meta charset="UTF-8">   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">   <title>Sanskardham Hospital | Vision v2.0</title>   <script src="https://cdn.tailwindcss.com"></script>   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&amp;display=swap" rel="stylesheet">   <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>   <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>   <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>   <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>   <style>         body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; touch-action: manipulation; overflow-x: hidden; }         .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }         .btn-active:active { transform: scale(0.95); transition: 0.1s; }         .main-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }         .sidebar { transition: transform 0.3s ease-in-out; transform: translateX(-100%); position: fixed; top: 0; left: 0; height: 100%; width: 280px; background: white; z-index: 1000; box-shadow: 10px 0 20px rgba(0,0,0,0.1); }         .sidebar.open { transform: translateX(0); }         .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }         .overlay.active { display: block; }         .modal-anim { animation: zoomIn 0.2s ease-out; }         @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }     </style> </head> <body>   <div id="overlay" class="overlay" onclick="toggleMenu()"></div>   <div id="sidebar" class="sidebar p-6 flex flex-col">     <div class="mb-8 border-b pb-4">       <h2 class="text-xl font-black text-blue-900">Sanskardham</h2>       <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Menu Options</p>     </div>     <nav class="space-y-4 flex-grow">       <button onclick="showProfileForm()" class="w-full text-left p-4 rounded-2xl hover:bg-blue-50 flex items-center space-x-3 transition font-bold text-gray-700"><span>👤</span> <span>My Profile</span></button>       <button onclick="toggleMenu(); backToDuty()" class="w-full text-left p-4 rounded-2xl hover:bg-blue-50 flex items-center space-x-3 transition font-bold text-gray-700"><span>🏥</span> <span>Departments</span></button>       <button id="adminStaffLink" onclick="showStaffList()" class="hidden w-full text-left p-4 rounded-2xl bg-blue-600 text-white flex items-center space-x-3 transition font-bold shadow-lg"><span>📋</span> <span>Staff Records (Admin)</span></button>       <button class="w-full text-left p-4 rounded-2xl hover:bg-red-50 flex items-center space-x-3 transition font-bold text-red-600"><span>🗑️</span> <span>Delete Data</span></button>     </nav>     <button onclick="location.reload()" class="mt-auto p-4 bg-gray-100 rounded-2xl font-bold text-gray-500 text-center uppercase text-xs">Logout</button>   </div>    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white relative shadow-2xl">    <header class="gradient-header text-white p-6 rounded-b-[40px] shadow-lg sticky top-0 z-50">     <div class="flex justify-between items-center mb-2">      <div class="flex items-center space-x-4">        <button onclick="toggleMenu()" class="text-2xl">☰</button>        <div>         <h1 class="text-xl font-black tracking-tighter uppercase leading-none">Sanskardham</h1>         <p class="text-[9px] font-bold text-blue-200 uppercase tracking-widest">Vision v2.0</p>        </div>      </div>      <div id="roleBadge" class="hidden bg-white/20 px-3 py-1 rounded-xl text-[10px] font-bold uppercase tracking-widest">Guest</div>     </div>     <div id="dateArea" class="hidden flex items-center bg-black/10 rounded-2xl px-4 py-2 mt-2">      <span class="text-xs mr-2">📅</span> <input type="date" id="dateInput" onchange="refreshAll()" class="bg-transparent text-white font-bold outline-none text-sm w-full">      <button onclick="toggleShift()" id="shiftIco" class="ml-2 bg-white/20 p-1 rounded-lg text-lg">☀️</button>     </div>    </header>     <div id="loginPage" class="p-8 flex-grow flex flex-col justify-center space-y-5">     <div class="text-center mb-5">      <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4"> <span class="text-4xl">🏥</span> </div>      <h2 class="text-2xl font-black text-gray-800 tracking-tight">Staff Portal</h2>     </div>     <input type="text" id="loginID" placeholder="User ID" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none focus:ring-2 focus:ring-blue-600 text-center font-bold">     <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none focus:ring-2 focus:ring-blue-600 text-center font-bold">     <button onclick="login()" class="w-full gradient-header text-white p-5 rounded-2xl font-bold shadow-xl btn-active uppercase">Login</button>    </div>     <div id="profileSection" class="hidden p-6 flex-grow">      <button onclick="closeProfile()" class="text-blue-600 font-bold text-xs mb-6 uppercase">⬅ Back</button>      <h2 class="text-2xl font-black mb-6">My Profile</h2>      <div class="space-y-4">        <div><label class="text-[10px] font-bold text-gray-400">STAFF FULL NAME</label><input type="text" id="profName" class="w-full p-4 bg-gray-100 rounded-2xl font-bold"></div>        <div><label class="text-[10px] font-bold text-gray-400">ID NUMBER</label><input type="text" id="profID" class="w-full p-4 bg-gray-100 rounded-2xl font-bold"></div>        <div><label class="text-[10px] font-bold text-gray-400">MOBILE NUMBER</label><input type="number" id="profMobile" class="w-full p-4 bg-gray-100 rounded-2xl font-bold"></div>        <div><label class="text-[10px] font-bold text-gray-400">EXPERIENCE (YEARS)</label><input type="text" id="profExp" class="w-full p-4 bg-gray-100 rounded-2xl font-bold"></div>        <button onclick="submitProfile()" class="w-full gradient-header text-white p-5 rounded-2xl font-bold btn-active uppercase shadow-lg">Submit Profile</button>      </div>    </div>     <div id="staffListSection" class="hidden p-6 flex-grow">      <button onclick="closeStaffList()" class="text-blue-600 font-bold text-xs mb-6 uppercase">⬅ Back</button>      <h2 class="text-2xl font-black mb-6 italic">Registered Staff</h2>      <div id="staffListContainer" class="space-y-3"></div>    </div>     <div id="mainMenu" class="hidden p-6 space-y-6 flex-grow">     <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-[3px] mb-4">Main Services</h3>     <div class="grid grid-cols-2 gap-4">      <div onclick="showDutySection()" class="main-card p-6 bg-white rounded-[35px] flex flex-col items-center btn-active cursor-pointer border-blue-100 border-2">       <span class="text-4xl mb-3">📅</span> <span class="font-black text-slate-700 text-xs uppercase text-center">Duty List</span>      </div>      <div class="main-card p-6 bg-gray-50 rounded-[35px] flex flex-col items-center opacity-50"> <span class="text-4xl mb-3">🎨</span> <span class="font-bold text-slate-400 text-[10px] uppercase text-center">Poster Maker</span> </div>     </div>    </div>     <div id="dutySection" class="hidden p-5 space-y-6 flex-grow pb-32">     <button onclick="backToMenu()" class="text-blue-600 font-bold text-xs flex items-center uppercase tracking-tighter">⬅ Back to Menu</button>     <div class="relative">      <input type="text" id="searchBar" onkeyup="doSearch()" placeholder="તમારી ડ્યુટી શોધો..." class="w-full p-4 pl-12 rounded-2xl bg-white shadow-sm border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 font-bold"> <span class="absolute left-4 top-4 text-xl">🔍</span>     </div>     <div id="searchBox" class="hidden p-5 rounded-3xl border-2 font-bold text-center shadow-lg"></div>     <div class="flex justify-between items-center px-1">      <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Departments</h3>      <button id="addDeptBtn" onclick="openDeptModal()" class="hidden text-blue-600 font-bold text-[10px] uppercase bg-blue-50 px-3 py-1 rounded-full">+ Add Dept</button>     </div>     <div id="deptGrid" class="grid grid-cols-2 gap-4"></div>    </div>     <div id="listPage" class="hidden p-5 flex-grow pb-32">     <button onclick="backToDuty()" class="text-blue-600 font-bold text-xs mb-6 flex items-center uppercase tracking-tighter">⬅ Back to Duty List</button>     <div class="text-center mb-8"> <h2 id="lTitle" class="text-3xl font-black text-gray-800 uppercase italic"></h2> <p id="lSub" class="text-[10px] font-bold text-gray-400 uppercase tracking-[4px] mt-1"></p> </div>     <div id="lBody" class="space-y-3"></div>    </div>     <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-md border-t p-4 flex justify-center z-50">     <p class="text-blue-900 font-black text-[9px] tracking-[4px] opacity-40">JATIN SOLANKI BY VISION</p>    </footer>   </div>    <div id="editModal" class="hidden fixed inset-0 bg-black/60 z-[200] flex items-center justify-center p-6 backdrop-blur-sm">     <div class="bg-white w-full rounded-[40px] p-8 shadow-2xl modal-anim">      <h3 class="font-black text-gray-800 mb-2 text-center uppercase text-sm tracking-widest border-b pb-2 text-blue-600">Update Slot</h3>      <div class="space-y-3 mb-4 mt-4">        <div class="flex space-x-2">          <div class="flex-1"><label class="text-[8px] font-bold text-gray-400">FROM</label><input type="date" id="rangeStart" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold"></div>          <div class="flex-1"><label class="text-[8px] font-bold text-gray-400">TO</label><input type="date" id="rangeEnd" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold"></div>        </div>        <input type="text" id="staffInput" placeholder="સ્ટાફનું નામ..." class="w-full p-5 bg-gray-100 rounded-3xl outline-none font-black text-center text-lg">      </div>      <div class="flex space-x-3">       <button onclick="closeEdit()" class="flex-1 p-5 bg-gray-100 rounded-3xl font-bold text-gray-400 text-xs">CANCEL</button>       <button onclick="saveSlot()" class="flex-1 p-5 gradient-header text-white rounded-3xl font-bold text-xs">SAVE</button>      </div>     </div>   </div>    <script>     const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };     firebase.initializeApp(firebaseConfig);     const db = firebase.database().ref("hospital_v11_final");     const profileDB = firebase.database().ref("staff_profiles");      let role = "viewer", shift = "Day", selectedDate = "", appData = {}, currentEditKey = "";      function toggleMenu() {       const side = document.getElementById('sidebar');       const over = document.getElementById('overlay');       side.classList.toggle('open');       over.classList.toggle('active');     }      function login() {         const id = document.getElementById('loginID').value.trim();         const p = document.getElementById('loginPass').value;         if(id === "ssgd" && p === "9099020925") role = "admin";         else if(id === "ssgd" && p === "9712284024") role = "viewer";         else return alert("Invalid Login!");                  document.getElementById('loginPage').classList.add('hidden');         document.getElementById('mainMenu').classList.remove('hidden');         document.getElementById('roleBadge').classList.remove('hidden');         document.getElementById('roleBadge').innerText = role;         if(role === 'admin') document.getElementById('adminStaffLink').classList.remove('hidden');         startSync();     }      function startSync() {         const today = new Date().toISOString().split('T')[0];         document.getElementById('dateInput').value = today;         selectedDate = today;          db.on('value', (s) => {             appData = s.val() || { "Depts": ["OPD", "EMERGENCY", "OFF LIST"] };             renderGrid();         });     }      // Profile Functions     function showProfileForm() {       toggleMenu();       document.getElementById('mainMenu').classList.add('hidden');       document.getElementById('dutySection').classList.add('hidden');       document.getElementById('profileSection').classList.remove('hidden');     }      function closeProfile() {       document.getElementById('profileSection').classList.add('hidden');       document.getElementById('mainMenu').classList.remove('hidden');     }      function submitProfile() {       const data = {         name: document.getElementById('profName').value,         id: document.getElementById('profID').value,         mobile: document.getElementById('profMobile').value,         exp: document.getElementById('profExp').value       };       if(!data.name || !data.id) return alert("Please fill Name and ID");       profileDB.push(data);       alert("Profile Submitted Successfully!");       closeProfile();     }      // Admin Staff List Functions     function showStaffList() {       toggleMenu();       document.getElementById('mainMenu').classList.add('hidden');       document.getElementById('staffListSection').classList.remove('hidden');       profileDB.once('value', (s) => {         const list = s.val();         const container = document.getElementById('staffListContainer');         container.innerHTML = "";         if(!list) { container.innerHTML = "<p class='text-center text-gray-400'>No records found</p>"; return; }         Object.values(list).forEach(item => {           container.innerHTML += `             <div class="p-4 bg-white border-2 border-blue-50 rounded-3xl shadow-sm">               <p class="font-black text-blue-900">${item.name}</p>               <p class="text-[10px] font-bold text-gray-500">ID: ${item.id} | Mob: ${item.mobile}</p>               <p class="text-[10px] font-bold text-blue-500">Exp: ${item.exp}</p>             </div>           `;         });       });     }      function closeStaffList() {       document.getElementById('staffListSection').classList.add('hidden');       document.getElementById('mainMenu').classList.remove('hidden');     }      // Standard Functions (Keep Existing Logic)     function showDutySection() {         document.getElementById('mainMenu').classList.add('hidden');         document.getElementById('dutySection').classList.remove('hidden');         document.getElementById('dateArea').classList.remove('hidden');     }      function backToMenu() {         document.getElementById('dutySection').classList.add('hidden');         document.getElementById('mainMenu').classList.remove('hidden');         document.getElementById('dateArea').classList.add('hidden');     }      function renderGrid() {         const grid = document.getElementById('deptGrid');         grid.innerHTML = "";         const ds = appData["Depts"] || ["OPD", "EMERGENCY", "OFF LIST"];         ds.forEach(d => {             grid.innerHTML += `<div onclick="openView('${d}')" class="p-6 bg-white rounded-[35px] border border-slate-100 shadow-sm flex flex-col items-center btn-active">                 <span class="text-3xl mb-2">${d.toUpperCase().includes('OFF')?'😴':'🏥'}</span>                 <span class="font-bold text-slate-700 text-[10px] uppercase tracking-tighter">${d}</span>             </div>`;         });     }      function openView(d) {         document.getElementById('dutySection').classList.add('hidden');         document.getElementById('listPage').classList.remove('hidden');         document.getElementById('lTitle').innerText = d;         document.getElementById('lSub').innerText = `${shift} | ${selectedDate}`;         let h = "";         const limit = (d.toUpperCase() === 'OPD') ? 10 : 6;         for(let i=1; i<=limit; i++) {             let key = `${selectedDate}_${d}_${i}_${shift}`;             let val = appData[key] || "---";             h += `<div class="p-5 bg-slate-50 rounded-[25px] flex justify-between items-center border-l-4 border-blue-600 shadow-sm">                 <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Slot ${i}</span>                 <span onclick="${role==='admin'?`openEdit('${key}')`:''}" class="${role==='admin'?'text-blue-600 font-bold underline italic cursor-pointer':'font-bold text-slate-800'}">${val}</span>             </div>`;         }         document.getElementById('lBody').innerHTML = h;     }      function openEdit(key) {         currentEditKey = key;         document.getElementById('staffInput').value = appData[key] === "---" ? "" : (appData[key] || "");         document.getElementById('editModal').classList.remove('hidden');     }      function closeEdit() { document.getElementById('editModal').classList.add('hidden'); }      function saveSlot() {         const name = document.getElementById('staffInput').value.trim() || "---";         const startStr = document.getElementById('rangeStart').value;         const endStr = document.getElementById('rangeEnd').value;         if (!startStr || !endStr) return alert("તારીખ પસંદ કરો");         const start = new Date(startStr);         const end = new Date(endStr);         const parts = currentEditKey.split('_');         let updates = {};         let tempDate = new Date(start);         while(tempDate <= end) {             const dateStr = tempDate.toISOString().split('T')[0];             const newKey = `${dateStr}_${parts[1]}_${parts[2]}_${parts[3]}`;             updates[newKey] = name;             tempDate.setDate(tempDate.getDate() + 1);         }         db.update(updates).then(() => { closeEdit(); openView(parts[1]); });     }      function backToDuty() { document.getElementById('listPage').classList.add('hidden'); document.getElementById('dutySection').classList.remove('hidden'); }     function toggleShift() { shift = shift === "Day" ? "Night" : "Day"; document.getElementById('shiftIco').innerText = shift === "Day" ? "☀️" : "🌙"; if(!document.getElementById('listPage').classList.contains('hidden')) openView(document.getElementById('lTitle').innerText); }     function refreshAll() { selectedDate = document.getElementById('dateInput').value; if(!document.getElementById('listPage').classList.contains('hidden')) openView(document.getElementById('lTitle').innerText); }   </script> </body> </html>
