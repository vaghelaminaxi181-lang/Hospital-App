<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Final App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; touch-action: manipulation; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-active:active { transform: scale(0.95); transition: 0.1s; }
        .notify-anim { animation: fadeInDown 0.5s ease; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        /* નવી પટ્ટી માટે સાદી સ્ટાઇલ */
        .simple-notice { background: #fee2e2; color: #b91c1c; font-size: 12px; font-weight: bold; border-radius: 10px; padding: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto min-h-screen flex flex-col shadow-2xl bg-white relative overflow-hidden">
    
    <div id="popup" class="hidden fixed top-5 left-5 right-5 z-[100] notify-anim">
        <div class="bg-blue-600 text-white p-5 rounded-3xl shadow-2xl border-2 border-white">
            <div class="flex justify-between items-start">
                <div class="flex items-center">
                    <span class="text-3xl mr-3">📢</span>
                    <div>
                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Duty Update</p>
                        <p id="popMsg" class="font-bold text-sm leading-tight"></p>
                    </div>
                </div>
                <button onclick="this.parentElement.parentElement.parentElement.classList.add('hidden')" class="text-2xl font-bold leading-none">&times;</button>
            </div>
        </div>
    </div>

    <header class="gradient-header text-white p-6 rounded-b-[45px] shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-black tracking-tighter">SANSKARDHAM</h1>
                <p id="userLabel" class="text-[10px] font-bold text-blue-200 uppercase mt-1"></p>
            </div>
            <div class="flex space-x-2">
                <button onclick="toggleShift()" id="shiftIco" class="bg-white/20 p-2 rounded-2xl text-xl shadow-inner">☀️</button>
                <div id="roleLabel" class="bg-white/20 px-3 py-1 rounded-xl text-[10px] font-bold self-center">GUEST</div>
            </div>
        </div>
        <div class="flex items-center bg-black/10 rounded-2xl px-4 py-2">
            <span class="text-xs font-bold mr-2">📅</span>
            <input type="date" id="dateInput" onchange="dateChanged()" class="bg-transparent text-white font-bold outline-none text-sm w-full">
        </div>
    </header>

    <div id="loginPage" class="p-8 flex-grow flex flex-col justify-center space-y-5">
        <div class="text-center">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-4xl text-blue-600">🏥</span>
            </div>
            <h2 class="text-2xl font-black text-gray-800">Staff Portal</h2>
            <p class="text-gray-400 text-sm">તમારી વિગત ભરો</p>
        </div>
        <div class="space-y-3">
            <input type="text" id="sName" placeholder="તમારું નામ" class="w-full p-4 rounded-2xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-600 outline-none">
            <input type="tel" id="sID" placeholder="રોલ નંબર (ID)" class="w-full p-4 rounded-2xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-600 outline-none">
            <input type="password" id="aPass" placeholder="Admin Password (જો હોય તો)" class="w-full p-4 rounded-2xl bg-gray-50 border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-600 outline-none">
        </div>
        <button onclick="login()" class="w-full gradient-header text-white p-5 rounded-2xl font-bold shadow-xl btn-active">ચાલુ કરો (Login)</button>
    </div>

    <div id="homePage" class="hidden p-5 pb-28 space-y-6 overflow-y-auto">
        
        <div id="marqueeBox" class="simple-notice relative hidden">
            <marquee id="mainNoticeText">Sanskardham માં આપનું સ્વાગત છે...</marquee>
            <button id="editMBtn" onclick="updateMText()" class="hidden absolute top-0 right-0 bg-red-600 text-white text-[8px] px-1 rounded">EDIT</button>
        </div>

        <div class="relative flex items-center">
            <span class="absolute left-4 text-xl">🍳</span>
            <input type="text" id="searchBar" onkeyup="doSearch()" placeholder="મારી ડ્યુટી ક્યાં છે?" class="w-full p-4 pl-12 rounded-2xl bg-white shadow-sm border border-gray-100 outline-none focus:ring-2 focus:ring-blue-500 font-bold">
        </div>
        <div id="searchBox" class="hidden p-5 rounded-3xl border-2 font-bold text-center shadow-lg"></div>

        <div class="flex justify-between items-center px-2">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Departments</h3>
            <button id="addDept" onclick="addNewDept()" class="hidden text-green-600 font-bold text-xs uppercase tracking-tighter">+ Add Dept</button>
        </div>
        <div id="deptGrid" class="grid grid-cols-2 gap-4"></div>

        <div id="posterSection" class="mt-8">
            <div class="flex justify-between items-center mb-2 px-2">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Posters</h3>
                <button id="addPBtn" onclick="addP()" class="hidden text-blue-600 text-[10px] font-bold">+ ADD</button>
            </div>
            <div id="pList" class="flex space-x-3 overflow-x-auto pb-2"></div>
        </div>

        <div id="noticeSection" class="mt-6">
            <div class="flex justify-between items-center mb-2 px-2">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">Notices</h3>
                <button id="addNBtn" onclick="addN()" class="hidden text-blue-600 text-[10px] font-bold">+ ADD</button>
            </div>
            <div id="nList" class="space-y-2"></div>
        </div>
    </div>

    <div id="listPage" class="hidden p-5 pb-28">
        <button onclick="goHome()" class="text-blue-600 font-bold text-xs mb-6 flex items-center">⬅ BACK TO HOME</button>
        <div class="text-center mb-8">
            <h2 id="lTitle" class="text-xl font-black text-gray-800 uppercase leading-none"></h2>
            <p id="lSub" class="text-[10px] font-bold text-gray-400 mt-2 uppercase tracking-[3px]"></p>
        </div>
        <div id="lBody" class="space-y-4"></div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass border-t p-4 flex justify-center items-center z-50">
        <p class="text-blue-900 font-black text-[10px] tracking-[5px]">JATIN SOLANKI BY VISION</p>
    </footer>

</div>

<script>
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");

    let role = "viewer", shift = "Day", selectedDate = "", appData = {}, myName = "", myID = "";

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;
        selectedDate = today;
        
        if(localStorage.getItem('j_name')) {
            document.getElementById('sName').value = localStorage.getItem('j_name');
            document.getElementById('sID').value = localStorage.getItem('j_id');
        }
    };

    function login() {
        myName = document.getElementById('sName').value.trim();
        myID = document.getElementById('sID').value.trim();
        const p = document.getElementById('aPass').value;

        if(!myName || !myID) return alert("નામ અને રોલ નંબર લખો!");

        localStorage.setItem('j_name', myName);
        localStorage.setItem('j_id', myID);

        if(p === "14052001") role = "admin";
        
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('homePage').classList.remove('hidden');
        document.getElementById('roleLabel').innerText = role.toUpperCase();
        document.getElementById('userLabel').innerText = `👤 ${myName} (${myID})`;
        
        if(role==='admin') {
            document.getElementById('addDept').classList.remove('hidden');
            document.getElementById('editMBtn').classList.remove('hidden');
            document.getElementById('addPBtn').classList.remove('hidden');
            document.getElementById('addNBtn').classList.remove('hidden');
        }

        startApp();
    }

    function startApp() {
        db.on('value', (s) => {
            const freshData = s.val() || { "Depts": ["OPD", "OFF List"] };
            if(JSON.stringify(appData) !== JSON.stringify(freshData) && role === 'viewer') {
                checkDutyUpdates(freshData);
            }
            appData = freshData;
            renderGrid();
            renderExtras();
        });
    }

    function renderExtras() {
        // માર્ક્યુ
        if(appData.mText) {
            document.getElementById('marqueeBox').classList.remove('hidden');
            document.getElementById('mainNoticeText').innerText = appData.mText;
        }

        // પોસ્ટર
        const pl = document.getElementById('pList');
        pl.innerHTML = "";
        (appData.posters || []).forEach((u, i) => {
            pl.innerHTML += `<div class="relative min-w-[120px]"><img src="${u}" class="h-24 w-32 object-cover rounded-xl shadow-sm border">${role==='admin'?`<button onclick="delP(${i})" class="absolute top-0 right-0 bg-red-600 text-white p-1 rounded text-[8px]">X</button>`:''}</div>`;
        });

        // નોટિસ
        const nl = document.getElementById('nList');
        nl.innerHTML = "";
        (appData.notices || []).forEach((t, i) => {
            nl.innerHTML += `<div class="p-3 bg-white rounded-xl border-l-4 border-blue-500 shadow-sm relative"><p class="text-[11px] font-bold text-gray-700">${t}</p>${role==='admin'?`<button onclick="delN(${i})" class="absolute top-1 right-1 text-gray-300">x</button>`:''}</div>`;
        });
    }

    function updateMText() { const t = prompt("સૂચના પટ્ટી લખો:"); if(t) db.update({mText: t}); }
    function addP() { const u = prompt("ફોટાની URL લિંક:"); if(u) { let p = appData.posters || [];
