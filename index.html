<!doctype html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanskardham Hospital | Vision v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .gradient-header { background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); }
        .sidebar { transition: 0.3s; position: fixed; top: 0; left: -280px; height: 100%; width: 280px; background: white; z-index: 1000; box-shadow: 10px 0 20px rgba(0,0,0,0.1); }
        .sidebar.open { left: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="toggleMenu()"></div>

<div id="sidebar" class="sidebar p-6 flex flex-col">
    <div class="mb-8 border-b pb-4">
        <h2 class="text-xl font-black text-blue-900">SANSKARDHAM</h2>
        <p class="text-[10px] font-bold text-gray-400 tracking-widest uppercase">Navigation</p>
    </div>
    <nav class="space-y-2 flex-grow">
        <button onclick="showSection('profileSection')" class="w-full text-left p-4 rounded-xl hover:bg-blue-50 flex items-center space-x-3 font-bold text-gray-700"><span>👤</span> <span>My Profile</span></button>
        <button onclick="showSection('dutySection')" class="w-full text-left p-4 rounded-xl hover:bg-blue-50 flex items-center space-x-3 font-bold text-gray-700"><span>📅</span> <span>Duty Board</span></button>
        
        <div id="adminMenu" class="hidden pt-4 border-t mt-4 space-y-2">
            <p class="text-[9px] font-bold text-blue-600 uppercase px-4">Admin Panel</p>
            <button onclick="showSection('staffListSection'); loadStaffRecords();" class="w-full text-left p-4 rounded-xl bg-blue-50 text-blue-700 flex items-center space-x-3 font-bold"><span>📋</span> <span>Staff Records</span></button>
            <button onclick="showSection('fullDutySection'); loadFullDutyRecords();" class="w-full text-left p-4 rounded-xl bg-blue-600 text-white flex items-center space-x-3 font-bold shadow-md"><span>📝</span> <span>Full Duty List</span></button>
        </div>
    </nav>
    <button onclick="location.reload()" class="p-4 bg-red-50 rounded-xl font-bold text-red-500 text-xs text-center uppercase">Logout</button>
</div>

<div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-2xl relative">
    <header class="gradient-header text-white p-6 rounded-b-[40px] sticky top-0 z-50 shadow-lg">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <button id="menuBtn" onclick="toggleMenu()" class="text-2xl hidden">☰</button>
                <div>
                    <h1 class="text-xl font-black uppercase leading-none">Sanskardham</h1>
                    <p class="text-[9px] font-bold text-blue-200 tracking-widest uppercase">Vision v2.0</p>
                </div>
            </div>
            <div id="roleBadge" class="hidden bg-white/20 px-3 py-1 rounded-xl text-[10px] font-bold uppercase">Guest</div>
        </div>
        <div id="dateArea" class="hidden mt-4 flex items-center bg-black/10 rounded-2xl px-4 py-2">
            <input type="date" id="dateInput" onchange="refreshData()" class="bg-transparent text-white font-bold outline-none text-sm w-full">
            <button onclick="toggleShift()" id="shiftIco" class="ml-2 bg-white/20 p-1 rounded-lg text-lg">☀️</button>
        </div>
    </header>

    <main class="flex-grow p-4">
        <div id="loginPage" class="flex flex-col justify-center space-y-5 py-20">
            <div class="text-center">
                <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl shadow-inner">🏥</div>
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">Staff Portal</h2>
            </div>
            <div class="space-y-3">
                <input type="text" id="loginID" placeholder="User ID" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold focus:ring-2 focus:ring-blue-600">
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 rounded-2xl bg-gray-50 border border-gray-200 outline-none text-center font-bold focus:ring-2 focus:ring-blue-600">
            </div>
            <button onclick="login()" class="w-full gradient-header text-white p-5 rounded-2xl font-bold btn-active shadow-xl uppercase tracking-widest">Login</button>
        </div>

        <div id="fullDutySection" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-blue-50 space-y-3">
                <h2 class="text-xl font-black text-blue-900 uppercase italic">Duty Report</h2>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] font-bold text-gray-400">START DATE</label>
                        <input type="date" id="fStart" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold">
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-gray-400">END DATE</label>
                        <input type="date" id="fEnd" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold">
                    </div>
                </div>
                <div class="flex space-x-2">
                    <button onclick="loadFullDutyRecords()" class="flex-1 bg-blue-600 text-white p-3 rounded-xl font-bold text-xs uppercase shadow-md">Filter List</button>
                    <button onclick="downloadPDF()" class="flex-1 bg-green-600 text-white p-3 rounded-xl font-bold text-xs uppercase shadow-md">PDF Download</button>
                </div>
            </div>

            <div class="overflow-x-auto bg-white rounded-2xl shadow-sm border border-blue-50">
                <table class="w-full text-left border-collapse min-w-[450px]">
                    <thead class="bg-slate-100 text-blue-900 text-[10px] uppercase font-black">
                        <tr>
                            <th class="p-3 border-b">Date</th>
                            <th class="p-3 border-b">Staff Name</th>
                            <th class="p-3 border-b">Dept</th>
                            <th class="p-3 border-b">Shift</th>
                        </tr>
                    </thead>
                    <tbody id="fullDutyCont" class="text-[11px] font-bold text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div id="profileSection" class="hidden space-y-4">
            <h2 class="text-2xl font-black text-blue-900">My Profile</h2>
            <div class="bg-white p-6 rounded-3xl border border-blue-50 shadow-sm space-y-4">
                <input type="text" id="pName" placeholder="Full Name" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <input type="text" id="pID" placeholder="ID Number" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <input type="number" id="pMobile" placeholder="Mobile" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <input type="text" id="pExp" placeholder="Experience" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border outline-none">
                <button onclick="saveProfile()" class="w-full gradient-header text-white p-4 rounded-2xl font-bold uppercase shadow-lg">Save Profile</button>
            </div>
        </div>

        <div id="dutySection" class="hidden space-y-6">
            <div class="relative">
                <input type="text" id="searchBar" onkeyup="searchName()" placeholder="નામથી ડ્યુટી શોધો..." class="w-full p-4 pl-12 rounded-2xl border border-gray-100 shadow-sm outline-none font-bold">
                <span class="absolute left-4 top-4">🔍</span>
            </div>
            <div id="searchRes" class="hidden p-4 rounded-2xl font-bold text-center"></div>
            <div id="deptGrid" class="grid grid-cols-2 gap-4"></div>
        </div>

        <div id="listPage" class="hidden space-y-4">
            <button onclick="showSection('dutySection')" class="text-blue-600 font-bold text-xs flex items-center">⬅ BACK TO DEPARTMENTS</button>
            <div class="text-center bg-blue-50 py-4 rounded-3xl">
                <h2 id="lTitle" class="text-2xl font-black text-blue-900 uppercase italic"></h2>
                <p id="lSub" class="text-[10px] font-bold text-blue-400 tracking-[3px] mt-1"></p>
            </div>
            <div id="lBody" class="space-y-3"></div>
        </div>

        <div id="staffListSection" class="hidden space-y-3">
            <h2 class="text-2xl font-black text-blue-900">Staff Records</h2>
            <div id="staffListCont" class="space-y-3"></div>
        </div>
    </main>

    <footer class="p-4 flex justify-center border-t bg-white">
        <p class="text-blue-900 font-black text-[10px] tracking-[5px] opacity-60 uppercase">JATIN SOLANKI</p>
    </footer>
</div>

<div id="rangeModal" class="hidden fixed inset-0 bg-black/70 z-[2000] flex items-center justify-center p-6 backdrop-blur-md">
    <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
        <h3 class="font-black text-center border-b pb-3 mb-5 text-blue-900 uppercase">Set Duty Slot</h3>
        <div class="space-y-4 mb-6">
            <div class="flex space-x-3">
                <div class="flex-1">
                    <label class="text-[9px] font-bold text-gray-400 block mb-1">START DATE</label>
                    <input type="date" id="rStart" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold">
                </div>
                <div class="flex-1">
                    <label class="text-[9px] font-bold text-gray-400 block mb-1">END DATE</label>
                    <input type="date" id="rEnd" class="w-full p-2 bg-gray-50 border rounded-xl text-xs font-bold">
                </div>
            </div>
            <div>
                <label class="text-[9px] font-bold text-gray-400 block mb-1">STAFF NAME</label>
                <input type="text" id="rStaff" placeholder="નામ લખો..." class="w-full p-4 bg-blue-50 rounded-2xl font-bold text-center outline-none border border-blue-100">
            </div>
        </div>
        <div class="flex space-x-3">
            <button onclick="closeModal()" class="flex-1 p-4 bg-gray-100 rounded-2xl font-bold text-gray-500 text-xs">CANCEL</button>
            <button onclick="saveRangeDuty()" class="flex-1 p-4 gradient-header text-white rounded-2xl font-bold text-xs uppercase">Save Duty</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://jatin-9a897-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("hospital_v11_final");
    const profDB = firebase.database().ref("staff_profiles");

    let role = "viewer", shift = "Day", selDate = "", appData = {}, editKey = "";

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showSection(id) {
        if(document.getElementById('sidebar').classList.contains('open')) toggleMenu();
        const ids = ['loginPage', 'profileSection', 'dutySection', 'listPage', 'staffListSection', 'fullDutySection'];
        ids.forEach(x => document.getElementById(x).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function login() {
        const id = document.getElementById('loginID').value.trim();
        const p = document.getElementById('loginPass').value;
        
        if(id === "ssgd" && p === "9099020925") { role = "admin"; } 
        else if(id === "ssgd" && p === "9712284024") { role = "viewer"; } 
        else { return alert("ખોટો પાસવર્ડ!"); }

        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('menuBtn').classList.remove('hidden');
        document.getElementById('dateArea').classList.remove('hidden');
        document.getElementById('roleBadge').classList.remove('hidden');
        document.getElementById('roleBadge').innerText = role;
        
        if(role === 'admin') document.getElementById('adminMenu').classList.remove('hidden');

        selDate = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = selDate;
        document.getElementById('fStart').value = selDate;
        document.getElementById('fEnd').value = selDate;
        
        showSection('dutySection');
        syncData();
    }

    function syncData() {
        db.on('value', (s) => {
            appData = s.val() || { "Depts": ["OPD", "EMERGENCY", "OFF LIST"] };
            renderGrid();
        });
    }

    function renderGrid() {
        const grid = document.getElementById('deptGrid');
        grid.innerHTML = "";
        const depts = appData.Depts || ["OPD", "EMERGENCY", "OFF LIST"];
        depts.forEach(d => {
            grid.innerHTML += `<div onclick="openSlots('${d}')" class="p-6 bg-white rounded-[35px] border border-blue-50 shadow-sm flex flex-col items-center btn-active cursor-pointer">
                <span class="text-3xl mb-2">${d.includes('OFF')?'😴':'🏥'}</span>
                <span class="font-black text-blue-900 text-xs uppercase">${d}</span>
            </div>`;
        });
    }

    function openSlots(d) {
        showSection('listPage');
        document.getElementById('lTitle').innerText = d;
        document.getElementById('lSub').innerText = `${shift} | ${selDate}`;
        let h = "";
        const limit = (d === 'OPD') ? 10 : 6;
        for(let i=1; i<=limit; i++) {
            let key = `${selDate}_${d}_${i}_${shift}`;
            let val = appData[key] || "---";
            const handler = role === 'admin' ? `onclick="openRangeModal('${key}')"` : "";
            const style = role === 'admin' ? "cursor-pointer text-blue-600 underline font-black" : "font-black text-gray-800";
            h += `<div class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center border-l-4 border-blue-600">
                <span class="text-[10px] font-bold text-gray-400 uppercase">Slot ${i}</span>
                <span ${handler} class="${style}">${val}</span>
            </div>`;
        }
        document.getElementById('lBody').innerHTML = h;
    }

    function loadFullDutyRecords() {
        const cont = document.getElementById('fullDutyCont');
        const sDate = document.getElementById('fStart').value;
        const eDate = document.getElementById('fEnd').value;
        cont.innerHTML = "<tr><td colspan='4' class='p-5 text-center text-blue-300'>Filtering...</td></tr>";
        
        let rows = [];
        Object.keys(appData).forEach(k => {
            const p = k.split('_');
            if(p.length === 4 && appData[k] !== "---") {
                const dDate = p[0];
                if ((!sDate || dDate >= sDate) && (!eDate || dDate <= eDate)) {
                    rows.push({ d: p[0], dep: p[1], sl: p[2], sh: p[3], n: appData[k] });
                }
            }
        });

        rows.sort((a,b) => new Date(b.d) - new Date(a.d));
        cont.innerHTML = "";
        if(rows.length === 0) {
            cont.innerHTML = "<tr><td colspan='4' class='p-5 text-center text-gray-400'>No Records Found</td></tr>";
            return;
        }

        rows.forEach((r, i) => {
            const bg = i % 2 === 0 ? 'bg-white' : 'bg-blue-50/30';
            cont.innerHTML += `<tr class="${bg} border-b border-gray-100">
                <td class="p-3 text-blue-600 whitespace-nowrap">${r.d}</td>
                <td class="p-3 font-black text-gray-900 uppercase">${r.n}</td>
                <td class="p-3 text-gray-500">${r.dep} <span class="text-[8px] block">Slot ${r.sl}</span></td>
                <td class="p-3"><span class="px-2 py-0.5 rounded text-[9px] ${r.sh==='Day'?'bg-orange-100 text-orange-600':'bg-indigo-100 text-indigo-600'}">${r.sh}</span></td>
            </tr>`;
        });
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text("SANSKARDHAM HOSPITAL - DUTY LIST", 14, 15);
        doc.setFontSize(9);
        doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 22);

        const data = [];
        document.querySelectorAll("#fullDutyCont tr").forEach(row => {
            const cols = row.querySelectorAll("td");
            if(cols.length > 0) {
                data.push([cols[0].innerText, cols[1].innerText, cols[2].innerText.replace("\n", " "), cols[3].innerText]);
            }
        });

        if(data.length === 0) return alert("કોઈ ડેટા નથી!");

        doc.autoTable({
            startY: 28,
            head: [['Date', 'Staff Name', 'Department', 'Shift']],
            body: data,
            theme: 'grid',
            headStyles: { fillColor: [30, 58, 138] },
            styles: { fontSize: 8, fontStyle: 'bold' }
        });

        doc.save(`Duty_Report_${new Date().toISOString().split('T')[0]}.pdf`);
    }

    // Modal & Save Functions
    function openRangeModal(key) {
        editKey = key;
        document.getElementById('rStaff').value = (appData[key] === "---" || !appData[key]) ? "" : appData[key];
        document.getElementById('rStart').value = selDate;
        document.getElementById('rEnd').value = selDate;
        document.getElementById('rangeModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('rangeModal').classList.add('hidden'); }

    function saveRangeDuty() {
        const name = document.getElementById('rStaff').value.trim() || "---";
        const start = new Date(document.getElementById('rStart').value);
        const end = new Date(document.getElementById('rEnd').value);
        if(!start || !end) return alert("તારીખ પસંદ કરો");
        
        const parts = editKey.split('_'); 
        let updates = {};
        let temp = new Date(start);
        while(temp <= end) {
            let dStr = temp.toISOString().split('T')[0];
            let k = `${dStr}_${parts[1]}_${parts[2]}_${parts[3]}`;
            updates[k] = name;
            temp.setDate(temp.getDate() + 1);
        }
        db.update(updates).then(() => { closeModal(); openSlots(parts[1]); });
    }

    // Helper Functions
    function toggleShift() {
        shift = (shift === "Day") ? "Night" : "Day";
        document.getElementById('shiftIco').innerText = (shift === "Day") ? "☀️" : "🌙";
        refreshData();
    }

    function refreshData() {
        selDate = document.getElementById('dateInput').value;
        if(!document.getElementById('listPage').classList.contains('hidden')) {
            openSlots(document.getElementById('lTitle').innerText);
        }
    }

    function searchName() {
        const q = document.getElementById('searchBar').value.toLowerCase();
        let foundDep = "";
        if(!q) { document.getElementById('searchRes').classList.add('hidden'); return; }
        for(let k in appData) {
            if(k.startsWith(selDate) && k.endsWith(shift) && appData[k].toLowerCase().includes(q)) {
                foundDep = k.split('_')[1]; break;
            }
        }
        const resDiv = document.getElementById('searchRes');
        resDiv.classList.remove('hidden');
        resDiv.innerHTML = foundDep ? `✅ તમારી ડ્યુટી ${foundDep} માં છે.` : `⚠️ નામ મળ્યું નથી.`;
        resDiv.className = `p-4 rounded-2xl font-bold text-center ${foundDep?'bg-green-50 text-green-700':'bg-red-50 text-red-700'}`;
    }

    function saveProfile() {
        const name = document.getElementById('pName').value.trim();
        const id = document.getElementById('pID').value.trim();
        if(!name || !id) return alert("નામ અને ID જરૂરી છે!");
        profDB.push({ name, id, mob: document.getElementById('pMobile').value, exp: document.getElementById('pExp').value });
        alert("પ્રોફાઇલ સેવ થઈ ગઈ!");
        showSection('dutySection');
    }

    function loadStaffRecords() {
        const cont = document.getElementById('staffListCont');
        cont.innerHTML = "<p class='text-center py-4'>Loading...</p>";
        profDB.once('value', (s) => {
            cont.innerHTML = "";
            const data = s.val();
            if(!data) return cont.innerHTML = "No Records Found";
            Object.values(data).forEach(x => {
                cont.innerHTML += `<div class="p-4 bg-white border border-blue-50 rounded-2xl shadow-sm">
                    <p class="font-black text-blue-900">${x.name}</p>
                    <p class="text-[10px] font-bold text-gray-400 uppercase">ID: ${x.id} | Mob: ${x.mob}</p>
                </div>`;
            });
        });
    }
</script>
</body>
</html>
