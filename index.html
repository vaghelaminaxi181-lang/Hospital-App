<!DOCTYPE html><html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Duty Pro</title><script src="https://cdn.tailwindcss.com"></script><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script><style>
body { font-family: sans-serif; background:#f1f5f9; }
.card { background:white; padding:15px; border-radius:15px; margin-top:10px; }
</style></head><body><div class="max-w-md mx-auto p-4"><!-- LOGIN --><div id="loginPage">
<h2 class="text-xl font-bold mb-3 text-center">🏥 Staff Login</h2>
<input id="id" placeholder="User ID" class="w-full p-3 border mb-2 rounded">
<input id="pass" type="password" placeholder="Password" class="w-full p-3 border mb-2 rounded">
<button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded">Login</button>
</div><!-- APP --><div id="app" class="hidden"><!-- HEADER --><div class="card text-center">
<input type="date" id="date" class="p-2 border rounded" onchange="changeDate()">
<button onclick="toggleShift()" class="ml-2 bg-gray-200 px-3 py-1 rounded">Shift</button>
<p id="shiftText" class="mt-2 font-bold"></p>
</div><!-- SEARCH --><div class="card">
<input id="search" onkeyup="search()" placeholder="Search name..." class="w-full p-3 border rounded">
</div><!-- ADMIN MULTI DATE --><div id="multiBox" class="card hidden">
<input id="multi" placeholder="2026-04-07,2026-04-08" class="w-full p-3 border rounded">
</div><!-- DUTY LIST --><div class="card">
<h3 class="font-bold">Duty</h3>
<div id="list"></div>
</div></div></div><script>
const firebaseConfig = {
 databaseURL:"https://jatin-9a897-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("hospital_v11_final");

let role="", shift="Day", date="", data={};

window.onload=()=>{
 let d=new Date().toISOString().split('T')[0];
 document.getElementById("date").value=d;
 date=d;
};

// LOGIN
function login(){
 let i=id.value, p=pass.value;

 if(i==="ssgd" && p==="9099020925") role="admin";
 else if(i==="ssgd" && p==="9712284024") role="staff";
 else return alert("Wrong");

 loginPage.style.display="none";
 app.style.display="block";

 if(role==="admin") multiBox.style.display="block";

 load();
}

// LOAD DATA
function load(){
 db.on("value",s=>{
   data=s.val()||{};
   render();
 });
}

// RENDER
function render(){
 let h="";
 for(let i=1;i<=6;i++){
   let key=`${date}_GEN_${i}_${shift}`;
   let val=data[key]||"---";

   h+=`
   <div class="flex justify-between p-2 border-b">
   <span>Slot ${i}</span>
   <span>
     <span onclick="${role==='admin'?`edit('${key}')`:''}" class="font-bold">${val}</span>
     ${role==="admin" && val!=="---"?`<button onclick="del('${key}')">❌</button>`:""}
   </span>
   </div>`;
 }
 list.innerHTML=h;
}

// EDIT
let current="";
function edit(k){
 current=k;
 let v=data[k]||"";
 let n=prompt("Name",v);
 if(n===null) return;

 let multi=document.getElementById("multi").value;

 if(role==="admin" && multi){
   let dates=multi.split(",");
   let up={};
   dates.forEach(d=>{
     let p=k.split("_");
     up[`${d.trim()}_${p[1]}_${p[2]}_${p[3]}`]=n;
   });
   db.update(up);
 } else {
   db.update({[k]:n});
 }
}

// DELETE
function del(k){
 if(confirm("Delete?")){
  db.update({[k]:"---"});
 }
}

// DATE CHANGE
function changeDate(){
 date=document.getElementById("date").value;
 render();
}

// SHIFT
function toggleShift(){
 shift=(shift==="Day")?"Night":"Day";
 shiftText.innerText=shift;
 render();
}

// SEARCH
function search(){
 let q=document.getElementById("search").value.toLowerCase();
 let res="";
 for(let k in data){
   if(data[k].toLowerCase().includes(q)){
     res+=data[k]+"<br>";
   }
 }
 list.innerHTML=res||"Not found";
}
</script></body>
</html>
